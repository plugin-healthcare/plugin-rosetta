---
id: https://w3id.org/plugin-rosetta/omop-results
name: omop_results
title: OMOP CDM Results Tables
description: >-
  LinkML representation of OMOP CDM 5.4 results/cohort (RESULTS schema) tables.
  Generated from OHDSI CommonDataModel v5.4.2.

license: MIT
version: "5.4.2"

prefixes:
  linkml: https://w3id.org/linkml/
  omop: https://athena.ohdsi.org/search-terms/terms#
  plugin_rosetta: https://w3id.org/plugin-rosetta/

default_prefix: https://w3id.org/plugin-rosetta/omop-results/
default_range: string

imports:
  - linkml:types

subsets:
  required_table:
    description: >-
      OMOP CDM tables that must be present in a conformant database.

classes:

  Cohort:
    class_uri: omop:Cohort
    description: "The subject of a cohort can have multiple, discrete records in the cohort table per cohort_definition_id, subject_id, and non-overlapping time periods. The definition of the cohort is contained within the COHORT_DEFINITION table. It is listed as part of the RESULTS schema because it is a table that users of the database as well as tools such as ATLAS need to be able to write to. The CDM and Vocabulary tables are all read-only so it is suggested that the COHORT and COHORT_DEFINTION tables are kept in a separate schema to alleviate confusion."
    annotations:
      omop_schema: RESULTS
    attributes:
      cohort_definition_id:
        range: integer
        required: true
        slot_uri: omop:cohort_definition_id
      subject_id:
        range: integer
        required: true
        slot_uri: omop:subject_id
      cohort_start_date:
        range: date
        required: true
        slot_uri: omop:cohort_start_date
      cohort_end_date:
        range: date
        required: true
        slot_uri: omop:cohort_end_date

  CohortDefinition:
    class_uri: omop:CohortDefinition
    description: "The COHORT_DEFINITION table contains records defining a Cohort derived from the data through the associated description and syntax and upon instantiation (execution of the algorithm) placed into the COHORT table. Cohorts are a set of subjects that satisfy a given combination of inclusion criteria for a duration of time. The COHORT_DEFINITION table provides a standardized structure for maintaining the rules governing the inclusion of a subject into a cohort, and can store operational programming code to instantiate the cohort within the OMOP Common Data Model."
    annotations:
      omop_schema: RESULTS
    attributes:
      cohort_definition_id:
        range: integer
        required: true
        slot_uri: omop:cohort_definition_id
        description: "This is the identifier given to the cohort, usually by the ATLAS application"
      cohort_definition_name:
        range: string
        required: true
        slot_uri: omop:cohort_definition_name
        description: "A short description of the cohort"
      cohort_definition_description:
        range: string
        required: false
        slot_uri: omop:cohort_definition_description
        description: "A complete description of the cohort."
      definition_type_concept_id:
        range: Concept
        required: true
        slot_uri: omop:definition_type_concept_id
        description: "Type defining what kind of Cohort Definition the record represents and how the syntax may be executed."
      cohort_definition_syntax:
        range: string
        required: false
        slot_uri: omop:cohort_definition_syntax
        description: "Syntax or code to operationalize the Cohort Definition."
      subject_concept_id:
        range: Concept
        required: true
        slot_uri: omop:subject_concept_id
        description: "This field contains a Concept that represents the domain of the subjects that are members of the cohort (e.g., Person, Provider, Visit)."
      cohort_initiation_date:
        range: date
        required: false
        slot_uri: omop:cohort_initiation_date
        description: "A date to indicate when the Cohort was initiated in the COHORT table."

