---
id: https://w3id.org/plugin-rosetta/omop-cdm
name: omop_cdm
title: OMOP CDM Clinical Tables
description: >-
  LinkML representation of OMOP CDM 5.4 clinical (CDM schema) tables.
  Generated from OHDSI CommonDataModel v5.4.2.

license: MIT
version: "5.4.2"

prefixes:
  linkml: https://w3id.org/linkml/
  omop: https://athena.ohdsi.org/search-terms/terms#
  plugin_rosetta: https://w3id.org/plugin-rosetta/

default_prefix: https://w3id.org/plugin-rosetta/omop-cdm/
default_range: string

imports:
  - linkml:types

subsets:
  required_table:
    description: >-
      OMOP CDM tables that must be present in a conformant database.

classes:

  Person:
    class_uri: omop:Person
    description: "This table serves as the central identity management for all Persons in the database. It contains records that uniquely identify each person or patient, and some demographic information."
    comments:
      - "All records in this table are independent Persons."
    in_subset:
      - required_table
    annotations:
      omop_schema: CDM
    attributes:
      person_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:person_id
        description: "It is assumed that every person with a different unique identifier is in fact a different person and should be treated independently."
        comments:
          - "Any person linkage that needs to occur to uniquely identify Persons ought to be done prior to writing this table. This identifier can be the original id from the source data provided if it is an integer, otherwise it can be an autogenerated number."
      gender_concept_id:
        range: Concept
        # fk_domain: Gender
        required: true
        slot_uri: omop:gender_concept_id
        description: "This field is meant to capture the biological sex at birth of the Person. This field should not be used to study gender identity issues."
        comments:
          - "Use the gender or sex value present in the data under the assumption that it is the biological sex at birth. If the source data captures gender identity it should be stored in the [OBSERVATION](https://ohdsi.github.io/CommonDataModel/cdm531.html#observation) table. [Accepted gender concepts](http://athena.ohdsi.org/search-terms/terms?domain=Gender&standardConcept=Standard&page=1&pageSize=15&query=). Please refer to the [THEMIS repository](https://ohdsi.github.io/Themis/tag_gender_concept_id.html) for detailed conventions on how to populate this field."
      year_of_birth:
        range: integer
        required: true
        slot_uri: omop:year_of_birth
        description: "Compute age using year_of_birth."
        comments:
          - "For data sources with date of birth, the year should be extracted. If no year of birth is available all the person's data should be dropped from the CDM instance. For additional information on how to populate this field, please refer to the [THEMIS repository](https://ohdsi.github.io/Themis/tag_year_of_birth.html)."
      month_of_birth:
        range: integer
        required: false
        slot_uri: omop:month_of_birth
        comments:
          - "For data sources that provide the precise date of birth, the month should be extracted and stored in this field."
      day_of_birth:
        range: integer
        required: false
        slot_uri: omop:day_of_birth
        comments:
          - "For data sources that provide the precise date of birth, the day should be extracted and stored in this field."
      birth_datetime:
        range: datetime
        required: false
        slot_uri: omop:birth_datetime
        comments:
          - "This field is not required but highly encouraged. For data sources that provide the precise datetime of birth, that value should be stored in this field. For more information on how to populate this field, please refer to the [THEMIS repository](https://ohdsi.github.io/Themis/person.html)."
      race_concept_id:
        range: Concept
        # fk_domain: Race
        required: true
        slot_uri: omop:race_concept_id
        description: "This field captures race or ethnic background of the person."
        comments:
          - "Only use this field if you have information about race or ethnic background. The Vocabulary contains Concepts about the main races and ethnic backgrounds in a hierarchical system. Due to the imprecise nature of human races and ethnic backgrounds, this is not a perfect system. Mixed races are not supported. If a clear race or ethnic background cannot be established, use Concept_Id 0. [Accepted Race Concepts](http://athena.ohdsi.org/search-terms/terms?domain=Race&standardConcept=Standard&page=1&pageSize=15&query=)."
      ethnicity_concept_id:
        range: Concept
        # fk_domain: Ethnicity
        required: true
        slot_uri: omop:ethnicity_concept_id
        description: "This field captures Ethnicity as defined by the Office of Management and Budget (OMB) of the US Government: it distinguishes only between \"Hispanic\" and \"Not Hispanic\". Races and ethnic backgrounds are not stored here."
        comments:
          - "Only use this field if you have US-based data and a source of this information. Do not attempt to infer Ethnicity from the race or ethnic background of the Person. [Accepted ethnicity concepts](http://athena.ohdsi.org/search-terms/terms?domain=Ethnicity&standardConcept=Standard&page=1&pageSize=15&query=)"
      location_id:
        range: Location
        required: false
        slot_uri: omop:location_id
        description: "The location refers to the physical address of the person. This field should capture the last known location of the person."
        comments:
          - "Put the location_id from the [LOCATION](https://ohdsi.github.io/CommonDataModel/cdm531.html#location) table here that represents the most granular location information for the person. For additional information on how to populate this field, please refer to the [THEMIS repository](https://ohdsi.github.io/Themis/populate_person_location_id.html)."
      provider_id:
        range: Provider
        required: false
        slot_uri: omop:provider_id
        description: "The Provider refers to the last known primary care provider (General Practitioner)."
        comments:
          - "Put the provider_id from the [PROVIDER](https://ohdsi.github.io/CommonDataModel/cdm531.html#provider) table of the last known general practitioner of the person. If there are multiple providers, it is up to the ETL to decide which to put here."
      care_site_id:
        range: CareSite
        required: false
        slot_uri: omop:care_site_id
        description: "The Care Site refers to where the Provider typically provides the primary care."
      person_source_value:
        range: string
        required: false
        slot_uri: omop:person_source_value
        description: "Use this field to link back to persons in the source data. This is typically used for error checking of ETL logic."
        comments:
          - "Some use cases require the ability to link back to persons in the source data. This field allows for the storing of the person value as it appears in the source. This field is not required but strongly recommended."
      gender_source_value:
        range: string
        required: false
        slot_uri: omop:gender_source_value
        description: "This field is used to store the biological sex of the person from the source data. It is not intended for use in standard analytics but for reference only."
        comments:
          - "Put the assigned sex at birth of the person as it appears in the source data."
      gender_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:gender_source_concept_id
        description: "Due to the small number of options, this tends to be zero."
        comments:
          - "If the source data codes asigned sex at birth in a non-standard vocabulary, store the concept_id here."
      race_source_value:
        range: string
        required: false
        slot_uri: omop:race_source_value
        description: "This field is used to store the race of the person from the source data. It is not intended for use in standard analytics but for reference only."
        comments:
          - "Put the race of the person as it appears in the source data."
      race_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:race_source_concept_id
        description: "Due to the small number of options, this tends to be zero."
        comments:
          - "If the source data codes race in an OMOP supported vocabulary store the concept_id here."
      ethnicity_source_value:
        range: string
        required: false
        slot_uri: omop:ethnicity_source_value
        description: "This field is used to store the ethnicity of the person from the source data. It is not intended for use in standard analytics but for reference only."
        comments:
          - "If the person has an ethnicity other than the OMB standard of \"Hispanic\" or \"Not Hispanic\" store that value from the source data here."
      ethnicity_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:ethnicity_source_concept_id
        description: "Due to the small number of options, this tends to be zero."
        comments:
          - "If the source data codes ethnicity in an OMOP supported vocabulary, store the concept_id here."

  ObservationPeriod:
    class_uri: omop:ObservationPeriod
    description: "This table contains records which define spans of time during which two conditions are expected to hold: (i) Clinical Events that happened to the Person are recorded in the Event tables, and (ii) absence of records indicate such Events did not occur during this span of time."
    comments:
      - "For each Person, one or more OBSERVATION_PERIOD records may be present, but they will not overlap or be back to back to each other. Events may exist outside all of the time spans of the OBSERVATION_PERIOD records for a patient, however, absence of an Event outside these time spans cannot be construed as evidence of absence of an Event. Incidence or prevalence rates should only be calculated for the time of active OBSERVATION_PERIOD records. When constructing cohorts, outside Events can be used for inclusion criteria definition, but without any guarantee for the performance of these criteria. Also, OBSERVATION_PERIOD records can be as short as a single day, greatly disturbing the denominator of any rate calculation as part of cohort characterizations. To avoid that, apply minimal observation time as a requirement for any cohort definition."
    in_subset:
      - required_table
    annotations:
      omop_schema: CDM
    attributes:
      observation_period_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:observation_period_id
        description: "A Person can have multiple discrete Observation Periods which are identified by the Observation_Period_Id."
        comments:
          - "Assign a unique observation_period_id to each discrete Observation Period for a Person."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
        description: "The Person ID of the PERSON record for which the Observation Period is recorded."
      observation_period_start_date:
        range: date
        required: true
        slot_uri: omop:observation_period_start_date
        description: "Use this date to determine the start date of the Observation Period."
        comments:
          - "It is often the case that the idea of Observation Periods does not exist in source data. In those cases, the observation_period_start_date can be inferred as the earliest Event date available for the Person. In insurance claim data, the Observation Period can be considered as the time period the Person is enrolled with a payer. If a Person switches plans but stays with the same payer, and therefore capturing of data continues, that change would be captured in [PAYER_PLAN_PERIOD](https://ohdsi.github.io/CommonDataModel/cdm531.html#payer_plan_period)."
      observation_period_end_date:
        range: date
        required: true
        slot_uri: omop:observation_period_end_date
        description: "Use this date to determine the end date of the period for which we can assume that all events for a Person are recorded."
        comments:
          - "It is often the case that the idea of Observation Periods does not exist in source data. In those cases, the observation_period_end_date can be inferred as the last Event date available for the Person. In insurance claim data, the Observation Period can be considered as the time period the Person is enrolled with a payer."
      period_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: true
        slot_uri: omop:period_type_concept_id
        description: "This field can be used to determine the provenance of the Observation Period as in whether the period was determined from an insurance enrollment file, EHR healthcare encounters, or other sources."
        comments:
          - "Choose the observation_period_type_concept_id that best represents how the period was determined. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Type+Concept&standardConcept=Standard&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."

  VisitOccurrence:
    class_uri: omop:VisitOccurrence
    description: "This table contains Events where Persons engage with the healthcare system for a duration of time. They are often also called \"Encounters\". Visits are defined by a configuration of circumstances under which they occur, such as (i) whether the patient comes to a healthcare institution, the other way around, or the interaction is remote, (ii) whether and what kind of trained medical staff is delivering the service during the Visit, and (iii) whether the Visit is transient or for a longer period involving a stay in bed."
    comments:
      - "The configuration defining the Visit are described by Concepts in the Visit Domain, which form a hierarchical structure, but rolling up to generally familiar Visits adopted in most healthcare systems worldwide: - [Inpatient Visit](https://athena.ohdsi.org/search-terms/terms/9201): Person visiting hospital, at a Care Site, in bed, for duration of more than one day, with physicians and other Providers permanently available to deliver service around the clock - [Emergency Room Visit](https://athena.ohdsi.org/search-terms/terms/9203): Person visiting dedicated healthcare institution for treating emergencies, at a Care Site, within one day, with physicians and Providers permanently available to deliver service around the clock - [Emergency Room and Inpatient Visit](https://athena.ohdsi.org/search-terms/terms/262): Person visiting ER followed by a subsequent Inpatient Visit, where Emergency department is part of hospital, and transition from the ER to other hospital departments is undefined - [Non-hospital institution Visit](https://athena.ohdsi.org/search-terms/terms/42898160): Person visiting dedicated institution for reasons of poor health, at a Care Site, long-term or permanently, with no physician but possibly other Providers permanently available to deliver service around the clock - [Outpatient Visit](https://athena.ohdsi.org/search-terms/terms/9202): Person visiting dedicated ambulatory healthcare institution, at a Care Site, within one day, without bed, with physicians or medical Providers delivering service during Visit - [Home Visit](https://athena.ohdsi.org/search-terms/terms/581476): Provider visiting Person, without a Care Site, within one day, delivering service - [Telehealth Visit](https://athena.ohdsi.org/search-terms/terms/5083): Patient engages with Provider through communication media - [Pharmacy Visit](https://athena.ohdsi.org/search-terms/terms/581458): Person visiting pharmacy for dispensing of Drug, at a Care Site, within one day - [Laboratory Visit](https://athena.ohdsi.org/search-terms/terms/32036): Patient visiting dedicated institution, at a Care Site, within one day, for the purpose of a Measurement. - [Ambulance Visit](https://athena.ohdsi.org/search-terms/terms/581478): Person using transportation service for the purpose of initiating one of the other Visits, without a Care Site, within one day, potentially with Providers accompanying the Visit and delivering service - [Case Management Visit](https://athena.ohdsi.org/search-terms/terms/38004193): Person interacting with healthcare system, without a Care Site, within a day, with no Providers involved, for administrative purposes The Visit duration, or 'length of stay', is defined as VISIT_END_DATE - VISIT_START_DATE. For all Visits this is <1 day, except Inpatient Visits and Non-hospital institution Visits. The CDM also contains the VISIT_DETAIL table where additional information about the Visit is stored, for example, transfers between units during an inpatient Visit."
    annotations:
      omop_schema: CDM
    attributes:
      visit_occurrence_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:visit_occurrence_id
        description: "Use this to identify unique interactions between a person and the health care system. This identifier links across the other CDM event tables to associate events with a visit."
        comments:
          - "This should be populated by creating a unique identifier for each unique interaction between a person and the healthcare system where the person receives a medical good or service over a span of time."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
      visit_concept_id:
        range: Concept
        # fk_domain: Visit
        required: true
        slot_uri: omop:visit_concept_id
        description: "This field contains a concept id representing the kind of visit, like inpatient or outpatient. All concepts in this field should be standard and belong to the Visit domain."
        comments:
          - "Populate this field based on the kind of visit that took place for the person. For example this could be \"Inpatient Visit\", \"Outpatient Visit\", \"Ambulatory Visit\", etc. This table will contain standard concepts in the Visit domain. These concepts are arranged in a hierarchical structure to facilitate cohort definitions by rolling up to generally familiar Visits adopted in most healthcare systems worldwide. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Visit&standardConcept=Standard&page=1&pageSize=15&query=)."
      visit_start_date:
        range: date
        required: true
        slot_uri: omop:visit_start_date
        description: "For inpatient visits, the start date is typically the admission date. For outpatient visits the start date and end date will be the same."
        comments:
          - "When populating VISIT_START_DATE, you should think about the patient experience to make decisions on how to define visits. In the case of an inpatient visit this should be the date the patient was admitted to the hospital or institution. In all other cases this should be the date of the patient-provider interaction. If this information is not available the record should be dropped."
      visit_start_datetime:
        range: datetime
        required: false
        slot_uri: omop:visit_start_datetime
        comments:
          - "If no time is given for the start date of a visit, set it to midnight (00:00:0000)."
      visit_end_date:
        range: date
        required: true
        slot_uri: omop:visit_end_date
        description: "For inpatient visits the end date is typically the discharge date. If a Person is still an inpatient in the hospital at the time of the data extract and does not have a visit_end_date, then set the visit_end_date to the date of the data pull."
        comments:
          - "Visit end dates are mandatory. If end dates are not provided in the source there are three ways in which to derive them: - Outpatient Visit: visit_end_datetime = visit_start_datetime - Emergency Room Visit: visit_end_datetime = visit_start_datetime - Inpatient Visit: Usually there is information about discharge. If not, you should be able to derive the end date from the sudden decline of activity or from the absence of inpatient procedures/drugs. - Non-hospital institution Visits: Particularly for claims data, if end dates are not provided assume the visit is for the duration of month that it occurs. For Inpatient Visits ongoing at the date of ETL, put date of processing the data into visit_end_datetime and visit_type_concept_id with 32220 \"Still patient\" to identify the visit as incomplete. - All other Visits: visit_end_datetime = visit_start_datetime. If this is a one-day visit the end date should match the start date."
      visit_end_datetime:
        range: datetime
        required: false
        slot_uri: omop:visit_end_datetime
        description: "If a Person is still an inpatient in the hospital at the time of the data extract and does not have a visit_end_datetime, then set the visit_end_datetime to the datetime of the data pull."
        comments:
          - "If no time is given for the end date of a visit, set it to midnight (00:00:0000)."
      visit_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: true
        slot_uri: omop:visit_type_concept_id
        description: "Use this field to understand the provenance of the visit record, or where the record comes from."
        comments:
          - "Populate this field based on the provenance of the visit record, as in whether it came from an EHR record or billing claim. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Type+Concept&standardConcept=Standard&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."
      provider_id:
        range: Provider
        required: false
        slot_uri: omop:provider_id
        description: "There will only be one provider per visit record and the ETL document should clearly state how they were chosen (attending, admitting, etc.). If there are multiple providers associated with a visit in the source, this can be reflected in the event tables (CONDITION_OCCURRENCE, PROCEDURE_OCCURRENCE, etc.) or in the VISIT_DETAIL table."
        comments:
          - "If there are multiple providers associated with a visit, you will need to choose which one to put here. The additional providers can be stored in the [VISIT_DETAIL](https://ohdsi.github.io/CommonDataModel/cdm531.html#visit_detail) table."
      care_site_id:
        range: CareSite
        required: false
        slot_uri: omop:care_site_id
        description: "This field provides information about the Care Site where the Visit took place."
        comments:
          - "There should only be one Care Site associated with a Visit."
      visit_source_value:
        range: string
        required: false
        slot_uri: omop:visit_source_value
        description: "This field houses the verbatim value from the source data representing the kind of visit that took place (inpatient, outpatient, emergency, etc.)"
        comments:
          - "If there is information about the kind of visit in the source data that value should be stored here. If a visit is an amalgamation of visits from the source then use a hierarchy to choose the visit source value, such as IP -> ER-> OP. This should line up with the logic chosen to determine how visits are created."
      visit_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:visit_source_concept_id
        comments:
          - "If the visit source value is coded in the source data using an OMOP supported vocabulary put the concept id representing the source value here."
      admitted_from_concept_id:
        range: Concept
        # fk_domain: Visit
        required: false
        slot_uri: omop:admitted_from_concept_id
        description: "Use this field to determine where the patient was admitted from. This concept is part of the visit domain and can indicate if a patient was admitted to the hospital from a long-term care facility, for example."
        comments:
          - "If available, map the admitted_from_source_value to a standard concept in the visit domain. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Visit&standardConcept=Standard&page=1&pageSize=15&query=). If a person was admitted from home or was self-referred, set this to 0."
      admitted_from_source_value:
        range: string
        required: false
        slot_uri: omop:admitted_from_source_value
        comments:
          - "This information may be called something different in the source data but the field is meant to contain a value indicating where a person was admitted from. Typically this applies only to visits that have a length of stay, like inpatient visits or long-term care visits."
      discharged_to_concept_id:
        range: Concept
        # fk_domain: Visit
        required: false
        slot_uri: omop:discharged_to_concept_id
        description: "Use this field to determine where the patient was discharged to after a visit. This concept is part of the visit domain and can indicate if a patient was transferred to another hospital or sent to a long-term care facility, for example. It is assumed that a person is discharged to home therefore there is not a standard concept id for \"home\". Use concept id = 0 when a person is discharged to home."
        comments:
          - "If available, map the discharged_to_source_value to a standard concept in the visit domain. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Visit&standardConcept=Standard&page=1&pageSize=15&query=)."
      discharged_to_source_value:
        range: string
        required: false
        slot_uri: omop:discharged_to_source_value
        comments:
          - "This information may be called something different in the source data but the field is meant to contain a value indicating where a person was discharged to after a visit, as in they went home or were moved to long-term care. Typically this applies only to visits that have a length of stay of a day or more."
      preceding_visit_occurrence_id:
        range: VisitOccurrence
        required: false
        slot_uri: omop:preceding_visit_occurrence_id
        description: "Use this field to find the visit that occurred for the person prior to the given visit. There could be a few days or a few years in between."
        comments:
          - "This field can be used to link a visit immediately preceding the current visit. Note this is not symmetrical, and there is no such thing as a \"following_visit_id\"."

  VisitDetail:
    class_uri: omop:VisitDetail
    description: "The VISIT_DETAIL table is an optional table used to represents details of each record in the parent VISIT_OCCURRENCE table. A good example of this would be the movement between units in a hospital during an inpatient stay or claim lines associated with a one insurance claim. For every record in the VISIT_OCCURRENCE table there may be 0 or more records in the VISIT_DETAIL table with a 1:n relationship where n may be 0. The VISIT_DETAIL table is structurally very similar to VISIT_OCCURRENCE table and belongs to the visit domain."
    comments:
      - "The configuration defining the Visit Detail is described by Concepts in the Visit Domain, which form a hierarchical structure. The Visit Detail record will have an associated to the Visit Occurrence record in two ways: <br> 1. The Visit Detail record will have the VISIT_OCCURRENCE_ID it is associated to 2. The VISIT_DETAIL_CONCEPT_ID will be a descendant of the VISIT_CONCEPT_ID for the Visit."
    annotations:
      omop_schema: CDM
    attributes:
      visit_detail_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:visit_detail_id
        description: "Use this to identify unique interactions between a person and the health care system. This identifier links across the other CDM event tables to associate events with a visit detail."
        comments:
          - "This should be populated by creating a unique identifier for each unique interaction between a person and the healthcare system where the person receives a medical good or service over a span of time."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
      visit_detail_concept_id:
        range: Concept
        # fk_domain: Visit
        required: true
        slot_uri: omop:visit_detail_concept_id
        description: "This field contains a concept id representing the kind of visit detail, like inpatient or outpatient. All concepts in this field should be standard and belong to the Visit domain."
        comments:
          - "Populate this field based on the kind of visit that took place for the person. For example this could be \"Inpatient Visit\", \"Outpatient Visit\", \"Ambulatory Visit\", etc. This table will contain standard concepts in the Visit domain. These concepts are arranged in a hierarchical structure to facilitate cohort definitions by rolling up to generally familiar Visits adopted in most healthcare systems worldwide. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Visit&standardConcept=Standard&page=1&pageSize=15&query=)."
      visit_detail_start_date:
        range: date
        required: true
        slot_uri: omop:visit_detail_start_date
        description: "This is the date of the start of the encounter. This may or may not be equal to the date of the Visit the Visit Detail is associated with."
        comments:
          - "When populating VISIT_DETAIL_START_DATE, you should think about the patient experience to make decisions on how to define visits. Most likely this should be the date of the patient-provider interaction."
      visit_detail_start_datetime:
        range: datetime
        required: false
        slot_uri: omop:visit_detail_start_datetime
        comments:
          - "If no time is given for the start date of a visit, set it to midnight (00:00:0000)."
      visit_detail_end_date:
        range: date
        required: true
        slot_uri: omop:visit_detail_end_date
        description: "This the end date of the patient-provider interaction. If a Person is still an inpatient in the hospital at the time of the data extract and does not have a visit_end_date, then set the visit_end_date to the date of the data pull."
        comments:
          - "Visit Detail end dates are mandatory. If end dates are not provided in the source there are three ways in which to derive them:<br> - Outpatient Visit Detail: visit_detail_end_datetime = visit_detail_start_datetime - Emergency Room Visit Detail: visit_detail_end_datetime = visit_detail_start_datetime - Inpatient Visit Detail: Usually there is information about discharge. If not, you should be able to derive the end date from the sudden decline of activity or from the absence of inpatient procedures/drugs. - Non-hospital institution Visit Details: Particularly for claims data, if end dates are not provided assume the visit is for the duration of month that it occurs.<br> For Inpatient Visit Details ongoing at the date of ETL, put date of processing the data into visit_detai_end_datetime and visit_detail_type_concept_id with 32220 \"Still patient\" to identify the visit as incomplete. All other Visits Details: visit_detail_end_datetime = visit_detail_start_datetime."
      visit_detail_end_datetime:
        range: datetime
        required: false
        slot_uri: omop:visit_detail_end_datetime
        description: "If a Person is still an inpatient in the hospital at the time of the data extract and does not have a visit_end_datetime, then set the visit_end_datetime to the datetime of the data pull."
        comments:
          - "If no time is given for the end date of a visit, set it to midnight (00:00:0000)."
      visit_detail_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: true
        slot_uri: omop:visit_detail_type_concept_id
        description: "Use this field to understand the provenance of the visit detail record, or where the record comes from."
        comments:
          - "Populate this field based on the provenance of the visit detail record, as in whether it came from an EHR record or billing claim. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Type+Concept&standardConcept=Standard&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."
      provider_id:
        range: Provider
        required: false
        slot_uri: omop:provider_id
        description: "There will only be one provider per **visit** record and the ETL document should clearly state how they were chosen (attending, admitting, etc.). This is a typical reason for leveraging the VISIT_DETAIL table as even though each VISIT_DETAIL record can only have one provider, there is no limit to the number of VISIT_DETAIL records that can be associated to a VISIT_OCCURRENCE record."
        comments:
          - "The additional providers associated to a Visit can be stored in this table where each VISIT_DETAIL record represents a different provider."
      care_site_id:
        range: CareSite
        required: false
        slot_uri: omop:care_site_id
        description: "This field provides information about the Care Site where the Visit Detail took place."
        comments:
          - "There should only be one Care Site associated with a Visit Detail."
      visit_detail_source_value:
        range: string
        required: false
        slot_uri: omop:visit_detail_source_value
        description: "This field houses the verbatim value from the source data representing the kind of visit detail that took place (inpatient, outpatient, emergency, etc.)"
        comments:
          - "If there is information about the kind of visit detail in the source data that value should be stored here. If a visit is an amalgamation of visits from the source then use a hierarchy to choose the VISIT_DETAIL_SOURCE_VALUE, such as IP -> ER-> OP. This should line up with the logic chosen to determine how visits are created."
      visit_detail_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:visit_detail_source_concept_id
        comments:
          - "If the VISIT_DETAIL_SOURCE_VALUE is coded in the source data using an OMOP supported vocabulary put the concept id representing the source value here."
      admitted_from_concept_id:
        range: Concept
        # fk_domain: Visit
        required: false
        slot_uri: omop:admitted_from_concept_id
        description: "Use this field to determine where the patient was admitted from. This concept is part of the visit domain and can indicate if a patient was admitted to the hospital from a long-term care facility, for example."
        comments:
          - "If available, map the admitted_from_source_value to a standard concept in the visit domain. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Visit&standardConcept=Standard&page=1&pageSize=15&query=). If a person was admitted from home or was self-referred, set this to 0."
      admitted_from_source_value:
        range: string
        required: false
        slot_uri: omop:admitted_from_source_value
        comments:
          - "This information may be called something different in the source data but the field is meant to contain a value indicating where a person was admitted from. Typically this applies only to visits that have a length of stay, like inpatient visits or long-term care visits."
      discharged_to_source_value:
        range: string
        required: false
        slot_uri: omop:discharged_to_source_value
        comments:
          - "This information may be called something different in the source data but the field is meant to contain a value indicating where a person was discharged to after a visit, as in they went home or were moved to long-term care. Typically this applies only to visits that have a length of stay of a day or more."
      discharged_to_concept_id:
        range: Concept
        # fk_domain: Visit
        required: false
        slot_uri: omop:discharged_to_concept_id
        description: "Use this field to determine where the patient was discharged to after a visit. This concept is part of the visit domain and can indicate if a patient was transferred to another hospital or sent to a long-term care facility, for example. It is assumed that a person is discharged to home therefore there is not a standard concept id for \"home\". Use concept id = 0 when a person is discharged to home."
        comments:
          - "If available, map the DISCHARGE_TO_SOURCE_VALUE to a Standard Concept in the Visit domain. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Visit&standardConcept=Standard&page=1&pageSize=15&query=)."
      preceding_visit_detail_id:
        range: VisitDetail
        required: false
        slot_uri: omop:preceding_visit_detail_id
        description: "Use this field to find the visit detail that occurred for the person prior to the given visit detail record. There could be a few days or a few years in between."
        comments:
          - "The PRECEDING_VISIT_DETAIL_ID can be used to link a visit immediately preceding the current Visit Detail. Note this is not symmetrical, and there is no such thing as a \"following_visit_id\"."
      parent_visit_detail_id:
        range: VisitDetail
        required: false
        slot_uri: omop:parent_visit_detail_id
        description: "Use this field to find the visit detail that subsumes the given visit detail record. This is used in the case that a visit detail record needs to be nested beyond the VISIT_OCCURRENCE/VISIT_DETAIL relationship."
        comments:
          - "If there are multiple nested levels to how Visits are represented in the source, the VISIT_DETAIL_PARENT_ID can be used to record this relationship."
      visit_occurrence_id:
        range: VisitOccurrence
        required: true
        slot_uri: omop:visit_occurrence_id
        description: "Use this field to link the VISIT_DETAIL record to its VISIT_OCCURRENCE."
        comments:
          - "Put the VISIT_OCCURRENCE_ID that subsumes the VISIT_DETAIL record here."

  ConditionOccurrence:
    class_uri: omop:ConditionOccurrence
    description: "This table contains records of Events of a Person suggesting the presence of a disease or medical condition stated as a diagnosis, a sign, or a symptom, which is either observed by a Provider or reported by the patient."
    comments:
      - "Conditions are defined by Concepts from the Condition domain, which form a complex hierarchy. As a result, the same Person with the same disease may have multiple Condition records, which belong to the same hierarchical family. Most Condition records are mapped from diagnostic codes, but recorded signs, symptoms and summary descriptions also contribute to this table. Rule out diagnoses should not be recorded in this table, but in reality their negating nature is not always captured in the source data, and other precautions must be taken when when identifying Persons who should suffer from the recorded Condition. Record all conditions as they exist in the source data. Any decisions about diagnosis/phenotype definitions would be done through cohort specifications. These cohorts can be housed in the [COHORT](https://ohdsi.github.io/CommonDataModel/cdm531.html#payer_plan_period) table. Conditions span a time interval from start to end, but are typically recorded as single snapshot records with no end date. The reason is twofold: (i) At the time of the recording the duration is not known and later not recorded, and (ii) the Persons typically cease interacting with the healthcare system when they feel better, which leads to incomplete capture of resolved Conditions. The [CONDITION_ERA](https://ohdsi.github.io/CommonDataModel/cdm531.html#condition_era) table addresses this issue. Family history and past diagnoses ('history of') are not recorded in this table. Instead, they are listed in the [OBSERVATION](https://ohdsi.github.io/CommonDataModel/cdm531.html#observation) table. Codes written in the process of establishing the diagnosis, such as 'question of' of and 'rule out', should not represented here. Instead, they should be recorded in the [OBSERVATION](https://ohdsi.github.io/CommonDataModel/cdm531.html#observation) table, if they are used for analyses. However, this information is not always available."
    annotations:
      omop_schema: CDM
    attributes:
      condition_occurrence_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:condition_occurrence_id
        description: "The unique key given to a condition record for a person. Refer to the ETL for how duplicate conditions during the same visit were handled."
        comments:
          - "Each instance of a condition present in the source data should be assigned this unique key. In some cases, a person can have multiple records of the same condition within the same visit. It is valid to keep these duplicates and assign them individual, unique, CONDITION_OCCURRENCE_IDs, though it is up to the ETL how they should be handled."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
        description: "The PERSON_ID of the PERSON for whom the condition is recorded."
      condition_concept_id:
        range: Concept
        # fk_domain: Condition
        required: true
        slot_uri: omop:condition_concept_id
        description: "The CONDITION_CONCEPT_ID field is recommended for primary use in analyses, and must be used for network studies. This is the standard concept mapped from the source value which represents a condition"
        comments:
          - "The CONCEPT_ID that the CONDITION_SOURCE_VALUE maps to. Only records whose source values map to concepts with a domain of \"Condition\" should go in this table. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Condition&standardConcept=Standard&page=1&pageSize=15&query=)."
      condition_start_date:
        range: date
        required: true
        slot_uri: omop:condition_start_date
        description: "Use this date to determine the start date of the condition"
        comments:
          - "Most often data sources do not have the idea of a start date for a condition. Rather, if a source only has one date associated with a condition record it is acceptable to use that date for both the CONDITION_START_DATE and the CONDITION_END_DATE."
      condition_start_datetime:
        range: datetime
        required: false
        slot_uri: omop:condition_start_datetime
        comments:
          - "If a source does not specify datetime the convention is to set the time to midnight (00:00:0000)"
      condition_end_date:
        range: date
        required: false
        slot_uri: omop:condition_end_date
        description: "Use this date to determine the end date of the condition"
        comments:
          - "Most often data sources do not have the idea of a start date for a condition. Rather, if a source only has one date associated with a condition record it is acceptable to use that date for both the CONDITION_START_DATE and the CONDITION_END_DATE."
      condition_end_datetime:
        range: datetime
        required: false
        slot_uri: omop:condition_end_datetime
        comments:
          - "If a source does not specify datetime the convention is to set the time to midnight (00:00:0000)"
      condition_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: true
        slot_uri: omop:condition_type_concept_id
        description: "This field can be used to determine the provenance of the Condition record, as in whether the condition was from an EHR system, insurance claim, registry, or other sources."
        comments:
          - "Choose the CONDITION_TYPE_CONCEPT_ID that best represents the provenance of the record. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Type+Concept&standardConcept=Standard&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."
      condition_status_concept_id:
        range: Concept
        # fk_domain: Condition Status
        required: false
        slot_uri: omop:condition_status_concept_id
        description: "This concept represents the point during the visit the diagnosis was given (admitting diagnosis, final diagnosis), whether the diagnosis was determined due to laboratory findings, if the diagnosis was exclusionary, or if it was a preliminary diagnosis, among others."
        comments:
          - "Choose the Concept in the Condition Status domain that best represents the point during the visit when the diagnosis was given. These can include admitting diagnosis, principal diagnosis, and secondary diagnosis. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Condition+Status&standardConcept=Standard&page=1&pageSize=15&query=)."
      stop_reason:
        range: string
        required: false
        slot_uri: omop:stop_reason
        description: "The Stop Reason indicates why a Condition is no longer valid with respect to the purpose within the source data. Note that a Stop Reason does not necessarily imply that the condition is no longer occurring."
        comments:
          - "This information is often not populated in source data and it is a valid etl choice to leave it blank if the information does not exist."
      provider_id:
        range: Provider
        required: false
        slot_uri: omop:provider_id
        description: "The provider associated with condition record, e.g. the provider who made the diagnosis or the provider who recorded the symptom."
        comments:
          - "The ETL may need to make a choice as to which PROVIDER_ID to put here. Based on what is available this may or may not be different than the provider associated with the overall VISIT_OCCURRENCE record, for example the admitting vs attending physician on an EHR record."
      visit_occurrence_id:
        range: VisitOccurrence
        required: false
        slot_uri: omop:visit_occurrence_id
        description: "The visit during which the condition occurred."
        comments:
          - "Depending on the structure of the source data, this may have to be determined based on dates. If a CONDITION_START_DATE occurs within the start and end date of a Visit it is a valid ETL choice to choose the VISIT_OCCURRENCE_ID from the Visit that subsumes it, even if not explicitly stated in the data. While not required, an attempt should be made to locate the VISIT_OCCURRENCE_ID of the CONDITION_OCCURRENCE record."
      visit_detail_id:
        range: VisitDetail
        required: false
        slot_uri: omop:visit_detail_id
        description: "The VISIT_DETAIL record during which the condition occurred. For example, if the person was in the ICU at the time of the diagnosis the VISIT_OCCURRENCE record would reflect the overall hospital stay and the VISIT_DETAIL record would reflect the ICU stay during the hospital visit."
        comments:
          - "Same rules apply as for the VISIT_OCCURRENCE_ID."
      condition_source_value:
        range: string
        required: false
        slot_uri: omop:condition_source_value
        description: "This field houses the verbatim value from the source data representing the condition that occurred. For example, this could be an ICD10 or Read code."
        comments:
          - "This code is mapped to a Standard Condition Concept in the Standardized Vocabularies and the original code is stored here for reference."
      condition_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:condition_source_concept_id
        description: "This is the concept representing the condition source value and may not necessarily be standard. This field is discouraged from use in analysis because it is not required to contain Standard Concepts that are used across the OHDSI community, and should only be used when Standard Concepts do not adequately represent the source detail for the Condition necessary for a given analytic use case. Consider using CONDITION_CONCEPT_ID instead to enable standardized analytics that can be consistent across the network."
        comments:
          - "If the CONDITION_SOURCE_VALUE is coded in the source data using an OMOP supported vocabulary put the concept id representing the source value here."
      condition_status_source_value:
        range: string
        required: false
        slot_uri: omop:condition_status_source_value
        description: "This field houses the verbatim value from the source data representing the condition status."
        comments:
          - "This information may be called something different in the source data but the field is meant to contain a value indicating when and how a diagnosis was given to a patient. This source value is mapped to a standard concept which is stored in the CONDITION_STATUS_CONCEPT_ID field."

  DrugExposure:
    class_uri: omop:DrugExposure
    description: "This table captures records about the exposure to a Drug ingested or otherwise introduced into the body. A Drug is a biochemical substance formulated in such a way that when administered to a Person it will exert a certain biochemical effect on the metabolism. Drugs include prescription and over-the-counter medicines, vaccines, and large-molecule biologic therapies. Radiological devices ingested or applied locally do not count as Drugs."
    comments:
      - "The purpose of records in this table is to indicate an exposure to a certain drug as best as possible. In this context a drug is defined as an active ingredient. Drug Exposures are defined by Concepts from the Drug domain, which form a complex hierarchy. As a result, one DRUG_SOURCE_CONCEPT_ID may map to multiple standard concept ids if it is a combination product. Records in this table represent prescriptions written, prescriptions dispensed, and drugs administered by a provider to name a few. The DRUG_TYPE_CONCEPT_ID can be used to find and filter on these types. This table includes additional information about the drug products, the quantity given, and route of administration."
    annotations:
      omop_schema: CDM
    attributes:
      drug_exposure_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:drug_exposure_id
        description: "The unique key given to records of drug dispensings or administrations for a person. Refer to the ETL for how duplicate drugs during the same visit were handled."
        comments:
          - "Each instance of a drug dispensing or administration present in the source data should be assigned this unique key. In some cases, a person can have multiple records of the same drug within the same visit. It is valid to keep these duplicates and assign them individual, unique, DRUG_EXPOSURE_IDs, though it is up to the ETL how they should be handled."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
        description: "The PERSON_ID of the PERSON for whom the drug dispensing or administration is recorded. This may be a system generated code."
      drug_concept_id:
        range: Concept
        # fk_domain: Drug
        required: true
        slot_uri: omop:drug_concept_id
        description: "The DRUG_CONCEPT_ID field is recommended for primary use in analyses, and must be used for network studies. This is the standard concept mapped from the source concept id which represents a drug product or molecule otherwise introduced to the body. The drug concepts can have a varying degree of information about drug strength and dose. This information is relevant in the context of quantity and administration information in the subsequent fields plus strength information from the DRUG_STRENGTH table, provided as part of the standard vocabulary download."
        comments:
          - "The CONCEPT_ID that the DRUG_SOURCE_VALUE maps to. The concept id should be derived either from mapping from the source concept id or by picking the drug concept representing the most amount of detail you have. Records whose source values map to standard concepts with a domain of Drug should go in this table. When the Drug Source Value of the code cannot be translated into Standard Drug Concept IDs, a Drug exposure entry is stored with only the corresponding SOURCE_CONCEPT_ID and DRUG_SOURCE_VALUE and a DRUG_CONCEPT_ID of 0. The Drug Concept with the most detailed content of information is preferred during the mapping process. These are indicated in the CONCEPT_CLASS_ID field of the Concept and are recorded in the following order of precedence: ÒMarketed ProductÓ, ÒBranded PackÓ, ÒClinical PackÓ, ÒBranded DrugÓ, ÒClinical DrugÓ, ÒBranded Drug ComponentÓ, ÒClinical Drug ComponentÓ, ÒBranded Drug FormÓ, ÒClinical Drug FormÓ, and only if no other information is available ÒIngredientÓ. Note: If only the drug class is known, the DRUG_CONCEPT_ID field should contain 0. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Drug&standardConcept=Standard&page=1&pageSize=15&query=)."
      drug_exposure_start_date:
        range: date
        required: true
        slot_uri: omop:drug_exposure_start_date
        description: "Use this date to determine the start date of the drug record."
        comments:
          - "Valid entries include a start date of a prescription, the date a prescription was filled, or the date on which a Drug administration was recorded. It is a valid ETL choice to use the date the drug was ordered as the DRUG_EXPOSURE_START_DATE."
      drug_exposure_start_datetime:
        range: datetime
        required: false
        slot_uri: omop:drug_exposure_start_datetime
        comments:
          - "This is not required, though it is in v6. If a source does not specify datetime the convention is to set the time to midnight (00:00:0000)"
      drug_exposure_end_date:
        range: date
        required: true
        slot_uri: omop:drug_exposure_end_date
        description: "The DRUG_EXPOSURE_END_DATE denotes the day the drug exposure ended for the patient."
        comments:
          - "If this information is not explicitly available in the data, infer the end date using the following methods:<br><br> 1. Start first with duration or days supply using the calculation drug start date + days supply -1 day. 2. Use quantity divided by daily dose that you may obtain from the sig or a source field (or assumed daily dose of 1) for solid, indivisibile, drug products. If quantity represents ingredient amount, quantity divided by daily dose * concentration (from drug_strength) drug concept id tells you the dose form. 3. If it is an administration record, set drug end date equal to drug start date. If the record is a written prescription then set end date to start date + 29. If the record is a mail-order prescription set end date to start date + 89. The end date must be equal to or greater than the start date. Ibuprofen 20mg/mL oral solution concept tells us this is oral solution. Calculate duration as quantity (200 example) * daily dose (5mL) /concentration (20mg/mL) 200*5/20 = 50 days. [Examples by dose form](https://ohdsi.github.io/CommonDataModel/drug_dose.html)<br><br>For detailed conventions for how to populate this field, please see the [THEMIS repository](https://ohdsi.github.io/Themis/tag_drug_exposure.html)."
      drug_exposure_end_datetime:
        range: datetime
        required: false
        slot_uri: omop:drug_exposure_end_datetime
        comments:
          - "This is not required, though it is in v6. If a source does not specify datetime the convention is to set the time to midnight (00:00:0000)"
      verbatim_end_date:
        range: date
        required: false
        slot_uri: omop:verbatim_end_date
        description: "This is the end date of the drug exposure as it appears in the source data, if it is given"
        comments:
          - "Put the end date or discontinuation date as it appears from the source data or leave blank if unavailable."
      drug_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: true
        slot_uri: omop:drug_type_concept_id
        description: "You can use the TYPE_CONCEPT_ID to delineate between prescriptions written vs. prescriptions dispensed vs. medication history vs. patient-reported exposure, etc."
        comments:
          - "Choose the drug_type_concept_id that best represents the provenance of the record, for example whether it came from a record of a prescription written or physician administered drug. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Type+Concept&standardConcept=Standard&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."
      stop_reason:
        range: string
        required: false
        slot_uri: omop:stop_reason
        description: "The reason a person stopped a medication as it is represented in the source. Reasons include regimen completed, changed, removed, etc. This field will be retired in v6.0."
        comments:
          - "This information is often not populated in source data and it is a valid etl choice to leave it blank if the information does not exist."
      refills:
        range: integer
        required: false
        slot_uri: omop:refills
        description: "This is only filled in when the record is coming from a prescription written this field is meant to represent intended refills at time of the prescription."
      quantity:
        range: float
        required: false
        slot_uri: omop:quantity
        comments:
          - "To find the dose form of a drug the RELATIONSHIP table can be used where the relationship_id is 'Has dose form'. If liquid, quantity stands for the total amount dispensed or ordered of ingredient in the units given by the drug_strength table. If the unit from the source data does not align with the unit in the DRUG_STRENGTH table the quantity should be converted to the correct unit given in DRUG_STRENGTH. For clinical drugs with fixed dose forms (tablets etc.) the quantity is the number of units/tablets/capsules prescribed or dispensed (can be partial, but then only 1/2 or 1/3, not 0.01). Clinical drugs with divisible dose forms (injections) the quantity is the amount of ingredient the patient got. For example, if the injection is 2mg/mL but the patient got 80mL then quantity is reported as 160. Quantified clinical drugs with divisible dose forms (prefilled syringes), the quantity is the amount of ingredient similar to clinical drugs. Please see [how to calculate drug dose](https://ohdsi.github.io/CommonDataModel/drug_dose.html) for more information."
      days_supply:
        range: integer
        required: false
        slot_uri: omop:days_supply
        comments:
          - "The number of days of supply of the medication as recorded in the original prescription or dispensing record. Days supply can differ from actual drug duration (i.e. prescribed days supply vs actual exposure).\",\"The field should be left empty if the source data does not contain a verbatim days_supply, and should not be calculated from other fields.<br><br>Negative values are not allowed. If the source has negative days supply the record should be dropped as it is unknown if the patient actually took the drug. Several actions are possible: 1) record is not trustworthy and we remove the record entirely. 2) we trust the record and leave days_supply empty or 3) record needs to be combined with other record (e.g. reversal of prescription). High values (>365 days) should be investigated. If considered an error in the source data (e.g. typo), the value needs to be excluded to prevent creation of unrealistic long eras."
      sig:
        range: string
        required: false
        slot_uri: omop:sig
        description: "This is the verbatim instruction for the drug as written by the provider."
        comments:
          - "Put the written out instructions for the drug as it is verbatim in the source, if available."
      route_concept_id:
        range: Concept
        # fk_domain: Route
        required: false
        slot_uri: omop:route_concept_id
        comments:
          - "The standard CONCEPT_ID that the ROUTE_SOURCE_VALUE maps to in the route domain."
      lot_number:
        range: string
        required: false
        slot_uri: omop:lot_number
      provider_id:
        range: Provider
        required: false
        slot_uri: omop:provider_id
        description: "The Provider associated with drug record, e.g. the provider who wrote the prescription or the provider who administered the drug."
        comments:
          - "The ETL may need to make a choice as to which PROVIDER_ID to put here. Based on what is available this may or may not be different than the provider associated with the overall VISIT_OCCURRENCE record, for example the ordering vs administering physician on an EHR record."
      visit_occurrence_id:
        range: VisitOccurrence
        required: false
        slot_uri: omop:visit_occurrence_id
        description: "The Visit during which the drug was prescribed, administered or dispensed."
        comments:
          - "To populate this field drug exposures must be explicitly initiated in the visit."
      visit_detail_id:
        range: VisitDetail
        required: false
        slot_uri: omop:visit_detail_id
        description: "The VISIT_DETAIL record during which the drug exposure occurred. For example, if the person was in the ICU at the time of the drug administration the VISIT_OCCURRENCE record would reflect the overall hospital stay and the VISIT_DETAIL record would reflect the ICU stay during the hospital visit."
        comments:
          - "Same rules apply as for the VISIT_OCCURRENCE_ID."
      drug_source_value:
        range: string
        required: false
        slot_uri: omop:drug_source_value
        description: "This field houses the verbatim value from the source data representing the drug exposure that occurred. For example, this could be an NDC or Gemscript code."
        comments:
          - "This code is mapped to a Standard Drug Concept in the Standardized Vocabularies and the original code is stored here for reference."
      drug_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:drug_source_concept_id
        description: "This is the concept representing the drug source value and may not necessarily be standard. This field is discouraged from use in analysis because it is not required to contain Standard Concepts that are used across the OHDSI community, and should only be used when Standard Concepts do not adequately represent the source detail for the Drug necessary for a given analytic use case. Consider using DRUG_CONCEPT_ID instead to enable standardized analytics that can be consistent across the network."
        comments:
          - "If the DRUG_SOURCE_VALUE is coded in the source data using an OMOP supported vocabulary put the concept id representing the source value here."
      route_source_value:
        range: string
        required: false
        slot_uri: omop:route_source_value
        description: "This field houses the verbatim value from the source data representing the drug route."
        comments:
          - "This information may be called something different in the source data but the field is meant to contain a value indicating when and how a drug was given to a patient. This source value is mapped to a standard concept which is stored in the ROUTE_CONCEPT_ID field."
      dose_unit_source_value:
        range: string
        required: false
        slot_uri: omop:dose_unit_source_value
        description: "This field houses the verbatim value from the source data representing the dose unit of the drug given."
        comments:
          - "This information may be called something different in the source data but the field is meant to contain a value indicating the unit of dosage of drug given to the patient. **This is an older column and will be deprecated in an upcoming version.**"

  ProcedureOccurrence:
    class_uri: omop:ProcedureOccurrence
    description: "This table contains records of activities or processes ordered by, or carried out by, a healthcare provider on the patient with a diagnostic or therapeutic purpose."
    comments:
      - "Lab tests are not a procedure, if something is observed with an expected resulting amount and unit then it should be a measurement. Phlebotomy is a procedure but so trivial that it tends to be rarely captured. It can be assumed that there is a phlebotomy procedure associated with many lab tests, therefore it is unnecessary to add them as separate procedures. If the user finds the same procedure over concurrent days, it is assumed those records are part of a procedure lasting more than a day. This logic is in lieu of the procedure_end_date, which will be added in a future version of the CDM."
    annotations:
      omop_schema: CDM
    attributes:
      procedure_occurrence_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:procedure_occurrence_id
        description: "The unique key given to a procedure record for a person. Refer to the ETL for how duplicate procedures during the same visit were handled."
        comments:
          - "Each instance of a procedure occurrence in the source data should be assigned this unique key. In some cases, a person can have multiple records of the same procedure within the same visit. It is valid to keep these duplicates and assign them individual, unique, PROCEDURE_OCCURRENCE_IDs, though it is up to the ETL how they should be handled."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
        description: "The PERSON_ID of the PERSON for whom the procedure is recorded. This may be a system generated code."
      procedure_concept_id:
        range: Concept
        # fk_domain: Procedure
        required: true
        slot_uri: omop:procedure_concept_id
        description: "The PROCEDURE_CONCEPT_ID field is recommended for primary use in analyses, and must be used for network studies. This is the standard concept mapped from the source value which represents a procedure"
        comments:
          - "The CONCEPT_ID that the PROCEDURE_SOURCE_VALUE maps to. Only records whose source values map to standard concepts with a domain of \"Procedure\" should go in this table. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Procedure&standardConcept=Standard&page=1&pageSize=15&query=)."
      procedure_date:
        range: date
        required: true
        slot_uri: omop:procedure_date
        description: "Use this date to determine the date the procedure started."
        comments:
          - "This is meant to be the **start date** of the procedure. It will be renamed in a future version to **PROCEDURE_START_DATE**."
      procedure_datetime:
        range: datetime
        required: false
        slot_uri: omop:procedure_datetime
        comments:
          - "If the procedure has a start time in the native date, use this field to house that information. This will be renamed in a future version to **PROCEDURE_START_DATETIME**."
      procedure_end_date:
        range: date
        required: false
        slot_uri: omop:procedure_end_date
        description: "Use this field to house the date that the procedure ended."
        comments:
          - "This is meant to be the end date of the procedure. It is not required and for most cases will be the same as the PROCEDURE_START_DATE."
      procedure_end_datetime:
        range: datetime
        required: false
        slot_uri: omop:procedure_end_datetime
        description: "Use this field to house the datetime that the procedure ended."
        comments:
          - "This is meant to house the end datetime of the procedure and will most often be used in conjunction with the procedure_start_datetime to determine the length of the procedure."
      procedure_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: true
        slot_uri: omop:procedure_type_concept_id
        description: "This field can be used to determine the provenance of the Procedure record, as in whether the procedure was from an EHR system, insurance claim, registry, or other sources."
        comments:
          - "Choose the PROCEDURE_TYPE_CONCEPT_ID that best represents the provenance of the record, for example whether it came from an EHR record or billing claim. If a procedure is recorded as an EHR encounter, the PROCEDURE_TYPE_CONCEPT would be 'EHR encounter record'. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Type+Concept&standardConcept=Standard&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."
      modifier_concept_id:
        range: Concept
        required: false
        slot_uri: omop:modifier_concept_id
        description: "The modifiers are intended to give additional information about the procedure but as of now the vocabulary is under review."
        comments:
          - "It is up to the ETL to choose how to map modifiers if they exist in source data. These concepts are typically distinguished by 'Modifier' concept classes (e.g., 'CPT4 Modifier' as part of the 'CPT4' vocabulary). If there is more than one modifier on a record, one should be chosen that pertains to the procedure rather than provider. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?conceptClass=CPT4+Modifier&conceptClass=HCPCS+Modifier&vocabulary=CPT4&vocabulary=HCPCS&standardConcept=Standard&page=1&pageSize=15&query=)."
      quantity:
        range: integer
        required: false
        slot_uri: omop:quantity
        description: "If the quantity value is omitted, a single procedure is assumed."
        comments:
          - "If a Procedure has a quantity of '0' in the source, this should default to '1' in the ETL. If there is a record in the source it can be assumed the exposure occurred at least once"
      provider_id:
        range: Provider
        required: false
        slot_uri: omop:provider_id
        description: "The provider associated with the procedure record, e.g. the provider who performed the Procedure."
        comments:
          - "The ETL may need to make a choice as to which PROVIDER_ID to put here. Based on what is available this may or may not be different than the provider associated with the overall VISIT_OCCURRENCE record, for example the admitting vs attending physician on an EHR record."
      visit_occurrence_id:
        range: VisitOccurrence
        required: false
        slot_uri: omop:visit_occurrence_id
        description: "The visit during which the procedure occurred."
        comments:
          - "Depending on the structure of the source data, this may have to be determined based on dates. If a PROCEDURE_DATE occurs within the start and end date of a Visit it is a valid ETL choice to choose the VISIT_OCCURRENCE_ID from the Visit that subsumes it, even if not explicitly stated in the data. While not required, an attempt should be made to locate the VISIT_OCCURRENCE_ID of the PROCEDURE_OCCURRENCE record."
      visit_detail_id:
        range: VisitDetail
        required: false
        slot_uri: omop:visit_detail_id
        description: "The VISIT_DETAIL record during which the Procedure occurred. For example, if the Person was in the ICU at the time of the Procedure the VISIT_OCCURRENCE record would reflect the overall hospital stay and the VISIT_DETAIL record would reflect the ICU stay during the hospital visit."
        comments:
          - "Same rules apply as for the VISIT_OCCURRENCE_ID."
      procedure_source_value:
        range: string
        required: false
        slot_uri: omop:procedure_source_value
        description: "This field houses the verbatim value from the source data representing the procedure that occurred. For example, this could be an CPT4 or OPCS4 code."
        comments:
          - "Use this value to look up the source concept id and then map the source concept id to a standard concept id."
      procedure_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:procedure_source_concept_id
        description: "This is the concept representing the procedure source value and may not necessarily be standard. This field is discouraged from use in analysis because it is not required to contain Standard Concepts that are used across the OHDSI community, and should only be used when Standard Concepts do not adequately represent the source detail for the Procedure necessary for a given analytic use case. Consider using PROCEDURE_CONCEPT_ID instead to enable standardized analytics that can be consistent across the network."
        comments:
          - "If the PROCEDURE_SOURCE_VALUE is coded in the source data using an OMOP supported vocabulary put the concept id representing the source value here."
      modifier_source_value:
        range: string
        required: false
        slot_uri: omop:modifier_source_value
        description: "This field houses the verbatim value from the source data representing the modifier code for the procedure that occurred."
        comments:
          - "The value stored here is mapped to a MODIFIER_CONCEPT_ID."

  DeviceExposure:
    class_uri: omop:DeviceExposure
    description: "The Device domain captures information about a person's exposure to a foreign physical object or instrument which is used for diagnostic or therapeutic purposes through a mechanism beyond chemical action. Devices include implantable objects (e.g. pacemakers, stents, artificial joints), medical equipment and supplies (e.g. bandages, crutches, syringes), other instruments used in medical procedures (e.g. sutures, defibrillators) and material used in clinical care (e.g. adhesives, body material, dental material, surgical material)."
    comments:
      - "The distinction between Devices or supplies and Procedures are sometimes blurry, but the former are physical objects while the latter are actions, often to apply a Device or supply."
    annotations:
      omop_schema: CDM
    attributes:
      device_exposure_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:device_exposure_id
        description: "The unique key given to records a person's exposure to a foreign physical object or instrument."
        comments:
          - "Each instance of an exposure to a foreign object or device present in the source data should be assigned this unique key."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
      device_concept_id:
        range: Concept
        # fk_domain: Device
        required: true
        slot_uri: omop:device_concept_id
        description: "The DEVICE_CONCEPT_ID field is recommended for primary use in analyses, and must be used for network studies. This is the standard concept mapped from the source concept id which represents a foreign object or instrument the person was exposed to."
        comments:
          - "The CONCEPT_ID that the DEVICE_SOURCE_VALUE maps to."
      device_exposure_start_date:
        range: date
        required: true
        slot_uri: omop:device_exposure_start_date
        description: "Use this date to determine the start date of the device record."
        comments:
          - "Valid entries include a start date of a procedure to implant a device, the date of a prescription for a device, or the date of device administration."
      device_exposure_start_datetime:
        range: datetime
        required: false
        slot_uri: omop:device_exposure_start_datetime
        comments:
          - "This is not required, though it is in v6. If a source does not specify datetime the convention is to set the time to midnight (00:00:0000)"
      device_exposure_end_date:
        range: date
        required: false
        slot_uri: omop:device_exposure_end_date
        description: "The DEVICE_EXPOSURE_END_DATE denotes the day the device exposure ended for the patient, if given."
        comments:
          - "Put the end date or discontinuation date as it appears from the source data or leave blank if unavailable."
      device_exposure_end_datetime:
        range: datetime
        required: false
        slot_uri: omop:device_exposure_end_datetime
        comments:
          - "If a source does not specify datetime the convention is to set the time to midnight (00:00:0000)"
      device_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: true
        slot_uri: omop:device_type_concept_id
        description: "You can use the TYPE_CONCEPT_ID to denote the provenance of the record, as in whether the record is from administrative claims or EHR."
        comments:
          - "Choose the drug_type_concept_id that best represents the provenance of the record, for example whether it came from a record of a prescription written or physician administered drug. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Type+Concept&standardConcept=Standard&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."
      unique_device_id:
        range: string
        required: false
        slot_uri: omop:unique_device_id
        description: "This is the Unique Device Identification (UDI-DI) number for devices regulated by the FDA, if given."
        comments:
          - "For medical devices that are regulated by the FDA, a Unique Device Identification (UDI) is provided if available in the data source and is recorded in the UNIQUE_DEVICE_ID field."
      production_id:
        range: string
        required: false
        slot_uri: omop:production_id
        description: "This is the Production Identifier (UDI-PI) portion of the Unique Device Identification."
      quantity:
        range: integer
        required: false
        slot_uri: omop:quantity
        comments:
          - "If there is a record of device exposure in the source but no quantity value, then set to 1."
      provider_id:
        range: Provider
        required: false
        slot_uri: omop:provider_id
        description: "The Provider associated with device record, e.g. the provider who wrote the prescription or the provider who implanted the device."
        comments:
          - "The ETL may need to make a choice as to which PROVIDER_ID to put here. Based on what is available this may or may not be different than the provider associated with the overall VISIT_OCCURRENCE record."
      visit_occurrence_id:
        range: VisitOccurrence
        required: false
        slot_uri: omop:visit_occurrence_id
        description: "The Visit during which the device was prescribed or given."
        comments:
          - "To populate this field device exposures must be explicitly initiated in the visit."
      visit_detail_id:
        range: VisitDetail
        required: false
        slot_uri: omop:visit_detail_id
        description: "The Visit Detail during which the device was prescribed or given."
        comments:
          - "To populate this field device exposures must be explicitly initiated in the visit detail record."
      device_source_value:
        range: string
        required: false
        slot_uri: omop:device_source_value
        description: "This field houses the verbatim value from the source data representing the device exposure that occurred. For example, this could be an NDC or Gemscript code."
        comments:
          - "This code is mapped to a Standard Device Concept in the Standardized Vocabularies and the original code is stored here for reference."
      device_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:device_source_concept_id
        description: "This is the concept representing the device source value and may not necessarily be standard. This field is discouraged from use in analysis because it is not required to contain Standard Concepts that are used across the OHDSI community, and should only be used when Standard Concepts do not adequately represent the source detail for the Device necessary for a given analytic use case. Consider using DEVICE_CONCEPT_ID instead to enable standardized analytics that can be consistent across the network."
        comments:
          - "If the DEVICE_SOURCE_VALUE is coded in the source data using an OMOP supported vocabulary put the concept id representing the source value here."
      unit_concept_id:
        range: Concept
        # fk_domain: Unit
        required: false
        slot_uri: omop:unit_concept_id
        description: "UNIT_SOURCE_VALUES should be mapped to a Standard Concept in the Unit domain that best represents the unit as given in the source data."
        comments:
          - "There is no standardization requirement for units associated with DEVICE_CONCEPT_IDs, however, it is the responsibility of the ETL to choose the most plausible unit. If the source unit is NULL (applicable to cases when there's no numerical value or when it doesn't require a unit), keep unit_concept_id NULL as well. If there's no mapping of a source unit, populate unit_concept_id with 0."
      unit_source_value:
        range: string
        required: false
        slot_uri: omop:unit_source_value
        description: "This field houses the verbatim value from the source data representing the unit of the Device. For example, blood transfusions are considered devices and can be given in mL quantities."
        comments:
          - "This code is mapped to a Standard Condition Concept in the Standardized Vocabularies and the original code is stored here for reference. Using the blood transfusion example, blood transfusion is represented by the DEVICE_CONCEPT_ID and the unit (mL) would be housed in the UNIT_SOURCE_VALUE and mapped to a standard concept in the unit domain."
      unit_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:unit_source_concept_id
        description: "This is the concept representing the UNIT_SOURCE_VALUE and may not necessarily be standard. This field is discouraged from use in analysis because it is not required to contain Standard Concepts that are used across the OHDSI community, and should only be used when Standard Concepts do not adequately represent the source detail for the Unit necessary for a given analytic use case. Consider using UNIT_CONCEPT_ID instead to enable standardized analytics that can be consistent across the network."
        comments:
          - "If the UNIT_SOURCE_VALUE is coded in the source data using an OMOP supported vocabulary put the concept id representing the source value here."

  Measurement:
    class_uri: omop:Measurement
    description: "The MEASUREMENT table contains records of Measurements, i.e. structured values (numerical or categorical) obtained through systematic and standardized examination or testing of a Person or Person's sample. The MEASUREMENT table contains both orders and results of such Measurements as laboratory tests, vital signs, quantitative findings from pathology reports, etc. Measurements are stored as attribute value pairs, with the attribute as the Measurement Concept and the value representing the result. The value can be a Concept (stored in VALUE_AS_CONCEPT), or a numerical value (VALUE_AS_NUMBER) with a Unit (UNIT_CONCEPT_ID). The Procedure for obtaining the sample is housed in the PROCEDURE_OCCURRENCE table, though it is unnecessary to create a PROCEDURE_OCCURRENCE record for each measurement if one does not exist in the source data. Measurements differ from Observations in that they require a standardized test or some other activity to generate a quantitative or qualitative result. If there is no result, it is assumed that the lab test was conducted but the result was not captured."
    comments:
      - "Measurements are predominately lab tests with a few exceptions, like blood pressure or function tests. Results are given in the form of a value and unit combination. When investigating measurements, look for operator_concept_ids (<, >, etc.)."
    annotations:
      omop_schema: CDM
    attributes:
      measurement_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:measurement_id
        description: "The unique key given to a Measurement record for a Person. Refer to the ETL for how duplicate Measurements during the same Visit were handled."
        comments:
          - "Each instance of a measurement present in the source data should be assigned this unique key. In some cases, a person can have multiple records of the same measurement within the same visit. It is valid to keep these duplicates and assign them individual, unique, MEASUREMENT_IDs, though it is up to the ETL how they should be handled."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
        description: "The PERSON_ID of the Person for whom the Measurement is recorded. This may be a system generated code."
      measurement_concept_id:
        range: Concept
        # fk_domain: Measurement
        required: true
        slot_uri: omop:measurement_concept_id
        description: "The MEASUREMENT_CONCEPT_ID field is recommended for primary use in analyses, and must be used for network studies. This is the standard concept mapped from the source value which represents a measurement."
        comments:
          - "The CONCEPT_ID that the MEASUREMENT_SOURCE_VALUE maps to. Only records whose source values map to concepts with a domain of ÒMeasurementÓ should go in this table."
      measurement_date:
        range: date
        required: true
        slot_uri: omop:measurement_date
        description: "Use this date to determine the date of the measurement."
        comments:
          - "If there are multiple dates in the source data associated with a record such as order_date, draw_date, and result_date, choose the one that is closest to the date the sample was drawn from the patient."
      measurement_datetime:
        range: datetime
        required: false
        slot_uri: omop:measurement_datetime
        comments:
          - "This is not required, though it is in v6. If a source does not specify datetime the convention is to set the time to midnight (00:00:0000)"
      measurement_time:
        range: string
        required: false
        slot_uri: omop:measurement_time
        comments:
          - "This is present for backwards compatibility and will be deprecated in an upcoming version."
      measurement_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: true
        slot_uri: omop:measurement_type_concept_id
        description: "This field can be used to determine the provenance of the Measurement record, as in whether the measurement was from an EHR system, insurance claim, registry, or other sources."
        comments:
          - "Choose the MEASUREMENT_TYPE_CONCEPT_ID that best represents the provenance of the record, for example whether it came from an EHR record or billing claim. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Type+Concept&standardConcept=Standard&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."
      operator_concept_id:
        range: Concept
        required: false
        slot_uri: omop:operator_concept_id
        description: "The meaning of Concept [4172703](https://athena.ohdsi.org/search-terms/terms/4172703) for '=' is identical to omission of a OPERATOR_CONCEPT_ID value. Since the use of this field is rare, it's important when devising analyses to not to forget testing for the content of this field for values different from =."
        comments:
          - "Operators are <, <=, =, >=, > and these concepts belong to the 'Meas Value Operator' domain. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Meas+Value+Operator&standardConcept=Standard&page=1&pageSize=15&query=). Leave it NULL if there's an exact numeric value given (instead of putting '=') or there's no numeric value at all."
      value_as_number:
        range: float
        required: false
        slot_uri: omop:value_as_number
        description: "This is the numerical value of the Result of the Measurement, if available. Note that measurements such as blood pressures will be split into their component parts i.e. one record for systolic, one record for diastolic."
        comments:
          - "[Convention for negative values](https://ohdsi.github.io/Themis/negative_value_as_number.html)"
      value_as_concept_id:
        range: Concept
        required: false
        slot_uri: omop:value_as_concept_id
        description: "If the raw data gives a categorial result for measurements those values are captured and mapped to standard concepts in the 'Meas Value' domain."
        comments:
          - "If there is no categorial result in the source data, set VALUE_AS_CONCEPT_ID to NULL, if there is a categorial result in a source data but without mapping, set VALUE_AS_CONCEPT_ID to 0, else map to a CONCEPT_ID."
      unit_concept_id:
        range: Concept
        # fk_domain: Unit
        required: false
        slot_uri: omop:unit_concept_id
        description: "At present, there isn't a prescribed unit for individual measurements, such as Hemoglobin A1C, meaning it's not obligatory to express these measurements as a percentage. UNIT_SOURCE_VALUES should be linked to a Standard Concept within the Unit domain that most accurately reflects the unit provided in the source data."
        comments:
          - "If the source data does not include units, set UNIT_CONCEPT_ID to NULL. If units are provided but not mapped, set UNIT_CONCEPT_ID to 0. Otherwise, map the units to a CONCEPT_ID. Remember that units are case-sensitive in vocabulary."
      range_low:
        range: float
        required: false
        slot_uri: omop:range_low
        description: "Ranges have the same unit as the VALUE_AS_NUMBER. These ranges are provided by the source and should remain NULL if not given."
        comments:
          - "If reference ranges for upper and lower limit of normal as provided (typically by a laboratory) these are stored in the RANGE_HIGH and RANGE_LOW fields. This should be set to NULL if not provided."
      range_high:
        range: float
        required: false
        slot_uri: omop:range_high
        description: "Ranges have the same unit as the VALUE_AS_NUMBER. These ranges are provided by the source and should remain NULL if not given."
        comments:
          - "If reference ranges for upper and lower limit of normal as provided (typically by a laboratory) these are stored in the RANGE_HIGH and RANGE_LOW fields. This should be set to NULL if not provided."
      provider_id:
        range: Provider
        required: false
        slot_uri: omop:provider_id
        description: "The provider associated with measurement record, e.g. the provider who ordered the test or the provider who recorded the result."
        comments:
          - "The ETL may need to make a choice as to which PROVIDER_ID to put here. Based on what is available this may or may not be different than the provider associated with the overall VISIT_OCCURRENCE record. For example the admitting vs attending physician on an EHR record."
      visit_occurrence_id:
        range: VisitOccurrence
        required: false
        slot_uri: omop:visit_occurrence_id
        description: "The visit during which the Measurement occurred."
        comments:
          - "Depending on the structure of the source data, this may have to be determined based on dates. If a MEASUREMENT_DATE occurs within the start and end date of a Visit it is a valid ETL choice to choose the VISIT_OCCURRENCE_ID from the visit that subsumes it, even if not explicitly stated in the data. While not required, an attempt should be made to locate the VISIT_OCCURRENCE_ID of the measurement record. If a measurement is related to a visit explicitly in the source data, it is possible that the result date of the Measurement falls outside of the bounds of the Visit dates."
      visit_detail_id:
        range: VisitDetail
        required: false
        slot_uri: omop:visit_detail_id
        description: "The VISIT_DETAIL record during which the Measurement occurred. For example, if the Person was in the ICU at the time the VISIT_OCCURRENCE record would reflect the overall hospital stay and the VISIT_DETAIL record would reflect the ICU stay during the hospital visit."
        comments:
          - "Same rules apply as for the VISIT_OCCURRENCE_ID."
      measurement_source_value:
        range: string
        required: false
        slot_uri: omop:measurement_source_value
        description: "This field contains the exact value from the source data that represents the measurement that occurred."
        comments:
          - "This value corresponds to a standardized CONCEPT_ID found in MEASUREMENT_CONCEPT_ID and in the 'Measurement' domain within the Standardized Vocabularies. The original code is retained here for reference purposes."
      measurement_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:measurement_source_concept_id
        description: "This is the concept representing the MEASUREMENT_SOURCE_VALUE and may not necessarily be standard. This field is discouraged from use in analysis because it is not required to contain Standard Concepts that are used across the OHDSI community, and should only be used when Standard Concepts do not adequately represent the source detail for the Measurement necessary for a given analytic use case. Consider using MEASUREMENT_CONCEPT_ID instead to enable standardized analytics that can be consistent across the network."
        comments:
          - "If the MEASUREMENT_SOURCE_VALUE is coded in the source data using a vocabulary supported by OMOP Standardized Vocabularies, insert the CONCEPT_ID representing the source value here."
      unit_source_value:
        range: string
        required: false
        slot_uri: omop:unit_source_value
        description: "This field contains the exact value from the source data that represents the unit of measurement used."
        comments:
          - "This value corresponds to a standardized CONCEPT_ID found in UNIT_CONCEPT_ID and in the 'Unit' domain within the Standardized Vocabularies. The original code is retained here for reference purposes."
      unit_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:unit_source_concept_id
        description: "\"This is the concept representing the UNIT_SOURCE_VALUE and may not necessarily be standard. This field is discouraged from use in analysis because it is not required to contain Standard Concepts that are used across the OHDSI community, and should only be used when Standard Concepts do not adequately represent the source detail for the Measurement necessary for a given analytic use case. Consider using UNIT_CONCEPT_ID instead to enable standardized analytics that can be consistent across the network.\""
        comments:
          - "If the UNIT_SOURCE_VALUE is coded in the source data using an OMOP supported vocabulary put the concept id representing the source value here."
      value_source_value:
        range: string
        required: false
        slot_uri: omop:value_source_value
        description: "This field houses the verbatim result value of the Measurement from the source data ."
        comments:
          - "If both a continuous and categorical result are given in the source data such that both VALUE_AS_NUMBER and VALUE_AS_CONCEPT_ID are both included, store the verbatim value that was mapped to VALUE_AS_CONCEPT_ID here."
      measurement_event_id:
        range: integer
        required: false
        slot_uri: omop:measurement_event_id
        description: "If the Measurement record is related to another record in the database, this field is the primary key of the linked record."
        comments:
          - "Put the primary key of the linked record, if applicable, here."
      meas_event_field_concept_id:
        range: Concept
        required: false
        slot_uri: omop:meas_event_field_concept_id
        description: "If the Measurement record is related to another record in the database, this field is the CONCEPT_ID that identifies which table the primary key of the linked record came from."
        comments:
          - "Put the CONCEPT_ID that identifies which table and field the MEASUREMENT_EVENT_ID came from."

  Observation:
    class_uri: omop:Observation
    description: "The OBSERVATION table captures clinical facts about a Person obtained in the context of examination, questioning or a procedure. Any data that cannot be represented by any other domains, such as social and lifestyle facts, medical history, family history, etc. are recorded here."
    comments:
      - "Observations differ from Measurements in that they do not require a standardized test or some other activity to generate clinical fact. Typical observations are medical history, family history, the stated need for certain treatment, social circumstances, lifestyle choices, healthcare utilization patterns, etc. If the generation clinical facts requires a standardized testing such as lab testing or imaging and leads to a standardized result, the data item is recorded in the MEASUREMENT table. If the clinical fact observed determines a sign, symptom, diagnosis of a disease or other medical condition, it is recorded in the CONDITION_OCCURRENCE table. Valid Observation Concepts are not enforced to be from any domain but they must not belong to the Condition, Procedure, Drug, Device, Specimen, or Measurement domains and they must be Standard Concepts. <br><br>The observation table usually records the date or datetime of when the observation was obtained, not the date of the observation starting. For example, if the patient reports that they had a heart attack when they were 50, the observation date or datetime is the date of the report, the heart attack observation can have a value_as_concept which captures how long ago the observation applied to the patient."
    annotations:
      omop_schema: CDM
    attributes:
      observation_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:observation_id
        description: "The unique key given to an Observation record for a Person. Refer to the ETL for how duplicate Observations during the same Visit were handled."
        comments:
          - "Each instance of an observation present in the source data should be assigned this unique key."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
        description: "The PERSON_ID of the Person for whom the Observation is recorded. This may be a system generated code."
      observation_concept_id:
        range: Concept
        required: true
        slot_uri: omop:observation_concept_id
        description: "The OBSERVATION_CONCEPT_ID field is recommended for primary use in analyses, and must be used for network studies."
        comments:
          - "The CONCEPT_ID that the OBSERVATION_SOURCE_CONCEPT_ID maps to. There is no specified domain that the Concepts in this table must adhere to. The only rule is that records with Concepts in the Condition, Procedure, Drug, Measurement, or Device domains MUST go to the corresponding table."
      observation_date:
        range: date
        required: true
        slot_uri: omop:observation_date
        description: "The date of when the Observation was obtained. Depending on what the Observation represents this could be the date of a lab test, the date of a survey, or the date a patient's family history was taken."
        comments:
          - "For some observations the ETL may need to make a choice as to which date to choose."
      observation_datetime:
        range: datetime
        required: false
        slot_uri: omop:observation_datetime
        comments:
          - "If no time is given set to midnight (00:00:00)."
      observation_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: true
        slot_uri: omop:observation_type_concept_id
        description: "This field can be used to determine the provenance of the Observation record, as in whether the measurement was from an EHR system, insurance claim, registry, or other sources."
        comments:
          - "Choose the OBSERVATION_TYPE_CONCEPT_ID that best represents the provenance of the record, for example whether it came from an EHR record or billing claim. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Type+Concept&standardConcept=Standard&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."
      value_as_number:
        range: float
        required: false
        slot_uri: omop:value_as_number
        description: "This is the numerical value of the Result of the Observation, if applicable and available. It is not expected that all Observations will have numeric results, rather, this field is here to house values should they exist."
      value_as_string:
        range: string
        required: false
        slot_uri: omop:value_as_string
        description: "This is the categorical value of the Result of the Observation, if applicable and available."
      value_as_concept_id:
        range: Concept
        required: false
        slot_uri: omop:value_as_concept_id
        description: "It is possible that some records destined for the Observation table have two clinical ideas represented in one source code. This is common with ICD10 codes that describe a family history of some Condition, for example. In OMOP the Vocabulary breaks these two clinical ideas into two codes; one becomes the OBSERVATION_CONCEPT_ID and the other becomes the VALUE_AS_CONCEPT_ID. It is important when using the Observation table to keep this possibility in mind and to examine the VALUE_AS_CONCEPT_ID field for relevant information."
        comments:
          - "Note that the value of VALUE_AS_CONCEPT_ID may be provided through mapping from a source Concept which contains the content of the Observation. In those situations, the CONCEPT_RELATIONSHIP table in addition to the 'Maps to' record contains a second record with the relationship_id set to 'Maps to value'. For example, ICD10 [Z82.4](https://athena.ohdsi.org/search-terms/terms/45581076) 'Family history of ischaemic heart disease and other diseases of the circulatory system' has a 'Maps to' relationship to [4167217](https://athena.ohdsi.org/search-terms/terms/4167217) 'Family history of clinical finding' as well as a 'Maps to value' record to [134057](https://athena.ohdsi.org/search-terms/terms/134057) 'Disorder of cardiovascular system'. If there's no categorial result in a source_data, set value_as_concept_id to NULL, if there is a categorial result in a source_data but without mapping, set value_as_concept_id to 0."
      qualifier_concept_id:
        range: Concept
        required: false
        slot_uri: omop:qualifier_concept_id
        description: "This field contains all attributes specifying the clinical fact further, such as as degrees, severities, drug-drug interaction alerts etc."
        comments:
          - "Use your best judgement as to what Concepts to use here and if they are necessary to accurately represent the clinical record. There is no restriction on the domain of these Concepts, they just need to be Standard."
      unit_concept_id:
        range: Concept
        # fk_domain: Unit
        required: false
        slot_uri: omop:unit_concept_id
        description: "There is currently no recommended unit for individual observation concepts. UNIT_SOURCE_VALUES should be mapped to a Standard Concept in the Unit domain that best represents the unit as given in the source data."
        comments:
          - "There is no standardization requirement for units associated with OBSERVATION_CONCEPT_IDs, however, it is the responsibility of the ETL to choose the most plausible unit. If the source unit is NULL (applicable to cases when there's no numerical value or when it doesn't require a unit), keep unit_concept_id NULL as well. If there's no mapping of a source unit, populate unit_concept_id with 0."
      provider_id:
        range: Provider
        required: false
        slot_uri: omop:provider_id
        description: "The provider associated with the observation record, e.g. the provider who ordered the test or the provider who recorded the result."
        comments:
          - "The ETL may need to make a choice as to which PROVIDER_ID to put here. Based on what is available this may or may not be different than the provider associated with the overall VISIT_OCCURRENCE record. For example the admitting vs attending physician on an EHR record."
      visit_occurrence_id:
        range: VisitOccurrence
        required: false
        slot_uri: omop:visit_occurrence_id
        description: "The visit during which the Observation occurred."
        comments:
          - "Depending on the structure of the source data, this may have to be determined based on dates. If an OBSERVATION_DATE occurs within the start and end date of a Visit it is a valid ETL choice to choose the VISIT_OCCURRENCE_ID from the visit that subsumes it, even if not explicitly stated in the data. While not required, an attempt should be made to locate the VISIT_OCCURRENCE_ID of the observation record. If an observation is related to a visit explicitly in the source data, it is possible that the result date of the Observation falls outside of the bounds of the Visit dates."
      visit_detail_id:
        range: VisitDetail
        required: false
        slot_uri: omop:visit_detail_id
        description: "The VISIT_DETAIL record during which the Observation occurred. For example, if the Person was in the ICU at the time the VISIT_OCCURRENCE record would reflect the overall hospital stay and the VISIT_DETAIL record would reflect the ICU stay during the hospital visit."
        comments:
          - "Same rules apply as for the VISIT_OCCURRENCE_ID."
      observation_source_value:
        range: string
        required: false
        slot_uri: omop:observation_source_value
        description: "This field houses the verbatim value from the source data representing the Observation that occurred. For example, this could be an ICD10 or Read code."
        comments:
          - "This code is mapped to a Standard Concept in the Standardized Vocabularies and the original code is stored here for reference."
      observation_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:observation_source_concept_id
        description: "This is the concept representing the OBSERVATION_SOURCE_VALUE and may not necessarily be standard. This field is discouraged from use in analysis because it is not required to contain Standard Concepts that are used across the OHDSI community, and should only be used when Standard Concepts do not adequately represent the source detail for the Observation necessary for a given analytic use case. Consider using OBSERVATION_CONCEPT_ID instead to enable standardized analytics that can be consistent across the network."
        comments:
          - "If the OBSERVATION_SOURCE_VALUE is coded in the source data using an OMOP supported vocabulary put the concept id representing the source value here."
      unit_source_value:
        range: string
        required: false
        slot_uri: omop:unit_source_value
        description: "This field houses the verbatim value from the source data representing the unit of the Observation that occurred."
        comments:
          - "This code is mapped to a Standard Condition Concept in the Standardized Vocabularies and the original code is stored here for reference."
      qualifier_source_value:
        range: string
        required: false
        slot_uri: omop:qualifier_source_value
        description: "This field houses the verbatim value from the source data representing the qualifier of the Observation that occurred."
        comments:
          - "This code is mapped to a Standard Condition Concept in the Standardized Vocabularies and the original code is stored here for reference."
      value_source_value:
        range: string
        required: false
        slot_uri: omop:value_source_value
        description: "This field houses the verbatim result value of the Observation from the source data. Do not get confused with the Observation_source_value which captures source value of the observation mapped to observation_concept_id. This field is the observation result value from the source."
        comments:
          - "If the observation_source_value was a question, for example, or an observation that requires a result then this field is the answer/ result from the source data. Store the verbatim value that represents the result of the observation_source_value."
      observation_event_id:
        range: integer
        required: false
        slot_uri: omop:observation_event_id
        description: "If the Observation record is related to another record in the database, this field is the primary key of the linked record."
        comments:
          - "Put the primary key of the linked record, if applicable, here. See the [ETL Conventions for the OBSERVATION](https://ohdsi.github.io/CommonDataModel/cdm60.html#observation) table for more details."
      obs_event_field_concept_id:
        range: Concept
        required: false
        slot_uri: omop:obs_event_field_concept_id
        description: "If the Observation record is related to another record in the database, this field is the CONCEPT_ID that identifies which table the primary key of the linked record came from."
        comments:
          - "Put the CONCEPT_ID that identifies which table and field the OBSERVATION_EVENT_ID came from."

  Death:
    class_uri: omop:Death
    description: "The death domain contains the clinical event for how and when a Person dies. A person can have up to one record if the source system contains evidence about the Death, such as: Condition in an administrative claim, status of enrollment into a health plan, or explicit record in EHR data."
    annotations:
      omop_schema: CDM
    attributes:
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
      death_date:
        range: date
        required: true
        slot_uri: omop:death_date
        description: "The date the person was deceased."
        comments:
          - "If the precise date include day or month is not known or not allowed, December is used as the default month, and the last day of the month the default day. For additional conventions related to this field, please refer to the [THEMIS repository](https://ohdsi.github.io/Themis/tag_death_date.html)."
      death_datetime:
        range: datetime
        required: false
        slot_uri: omop:death_datetime
        comments:
          - "If you have date and time of death, populate death_datetime, otherwise leave NULL"
      death_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: false
        slot_uri: omop:death_type_concept_id
        description: "This is the provenance of the death record, i.e., where it came from. It is possible that an administrative claims database would source death information from a government file so do not assume the Death Type is the same as the Visit Type, etc."
        comments:
          - "Use the type concept that reflects the source of the death record. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Type+Concept&standardConcept=Standard&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."
      cause_concept_id:
        range: Concept
        required: false
        slot_uri: omop:cause_concept_id
        description: "This is the Standard Concept representing the Person's cause of death, if available."
        comments:
          - "There is no specified domain for this concept, just choose the Standard Concept Id that best represents the person's cause of death."
      cause_source_value:
        range: string
        required: false
        slot_uri: omop:cause_source_value
        comments:
          - "If available, put the source code representing the cause of death here."
      cause_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:cause_source_concept_id
        comments:
          - "If the cause of death was coded using a Vocabulary present in the OMOP Vocabularies (not necessarily a standard concept) put the CONCEPT_ID representing the cause of death here."

  Note:
    class_uri: omop:Note
    description: "The NOTE table captures unstructured information that was recorded by a provider about a patient in free text (in ASCII, or preferably in UTF8 format) notes on a given date. The type of note_text is CLOB or varchar(MAX) depending on RDBMS."
    annotations:
      omop_schema: CDM
    attributes:
      note_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:note_id
        description: "A unique identifier for each note."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
      note_date:
        range: date
        required: true
        slot_uri: omop:note_date
        description: "The date the note was recorded."
      note_datetime:
        range: datetime
        required: false
        slot_uri: omop:note_datetime
        comments:
          - "If time is not given set the time to midnight."
      note_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: true
        slot_uri: omop:note_type_concept_id
        description: "The provenance of the note. Most likely this will be EHR."
        comments:
          - "Put the source system of the note, as in EHR record. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?standardConcept=Standard&domain=Type+Concept&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."
      note_class_concept_id:
        range: Concept
        required: true
        slot_uri: omop:note_class_concept_id
        description: "A Standard Concept Id representing the HL7 LOINC Document Type Vocabulary classification of the note."
        comments:
          - "Map the note classification to a Standard Concept. For more information see the ETL Conventions in the description of the NOTE table. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?standardConcept=Standard&conceptClass=Doc+Kind&conceptClass=Doc+Role&conceptClass=Doc+Setting&conceptClass=Doc+Subject+Matter&conceptClass=Doc+Type+of+Service&domain=Meas+Value&page=1&pageSize=15&query=). This Concept can alternatively be represented by concepts with the relationship 'Kind of (LOINC)' to [706391](https://athena.ohdsi.org/search-terms/terms/706391) (Note)."
      note_title:
        range: string
        required: false
        slot_uri: omop:note_title
        description: "The title of the note."
      note_text:
        range: string
        required: true
        slot_uri: omop:note_text
        description: "The content of the note."
      encoding_concept_id:
        range: Concept
        required: true
        slot_uri: omop:encoding_concept_id
        description: "This is the Concept representing the character encoding type."
        comments:
          - "Put the Concept Id that represents the encoding character type here. Currently the only option is UTF-8 ([32678](https://athena.ohdsi.org/search-terms/terms/32678)). It the note is encoded in any other type, like ASCII then put 0."
      language_concept_id:
        range: Concept
        required: true
        slot_uri: omop:language_concept_id
        description: "The language of the note."
        comments:
          - "Use Concepts that are descendants of the concept [4182347](https://athena.ohdsi.org/search-terms/terms/4182347) (World Languages)."
      provider_id:
        range: Provider
        required: false
        slot_uri: omop:provider_id
        description: "The Provider who wrote the note."
        comments:
          - "The ETL may need to make a determination on which provider to put here."
      visit_occurrence_id:
        range: VisitOccurrence
        required: false
        slot_uri: omop:visit_occurrence_id
        description: "The Visit during which the note was written."
      visit_detail_id:
        range: VisitDetail
        required: false
        slot_uri: omop:visit_detail_id
        description: "The Visit Detail during which the note was written."
      note_source_value:
        range: string
        required: false
        slot_uri: omop:note_source_value
        comments:
          - "The source value mapped to the NOTE_CLASS_CONCEPT_ID."
      note_event_id:
        range: integer
        required: false
        slot_uri: omop:note_event_id
        description: "If the Note record is related to another record in the database, this field is the primary key of the linked record."
        comments:
          - "Put the primary key of the linked record, if applicable, here."
      note_event_field_concept_id:
        range: Concept
        required: false
        slot_uri: omop:note_event_field_concept_id
        description: "If the Note record is related to another record in the database, this field is the CONCEPT_ID that identifies which table the primary key of the linked record came from."
        comments:
          - "Put the CONCEPT_ID that identifies which table and field the NOTE_EVENT_ID came from."

  NoteNlp:
    class_uri: omop:NoteNlp
    description: "The NOTE_NLP table encodes all output of NLP on clinical notes. Each row represents a single extracted term from a note."
    annotations:
      omop_schema: CDM
    attributes:
      note_nlp_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:note_nlp_id
        description: "A unique identifier for the NLP record."
      note_id:
        range: integer
        required: true
        slot_uri: omop:note_id
        description: "This is the NOTE_ID for the NOTE record the NLP record is associated to."
      section_concept_id:
        range: Concept
        required: false
        slot_uri: omop:section_concept_id
        comments:
          - "The SECTION_CONCEPT_ID should be used to represent the note section contained in the NOTE_NLP record. These concepts can be found as parts of document panels and are based on the type of note written, i.e. a discharge summary. These panels can be found as concepts with the relationship 'Subsumes' to CONCEPT_ID [45875957](https://athena.ohdsi.org/search-terms/terms/45875957)."
      snippet:
        range: string
        required: false
        slot_uri: omop:snippet
        description: "A small window of text surrounding the term"
      offset:
        range: string
        required: false
        slot_uri: omop:offset
        description: "Character offset of the extracted term in the input note"
      lexical_variant:
        range: string
        required: true
        slot_uri: omop:lexical_variant
        description: "Raw text extracted from the NLP tool."
      note_nlp_concept_id:
        range: Concept
        required: false
        slot_uri: omop:note_nlp_concept_id
      note_nlp_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:note_nlp_source_concept_id
      nlp_system:
        range: string
        required: false
        slot_uri: omop:nlp_system
        comments:
          - "Name and version of the NLP system that extracted the term. Useful for data provenance."
      nlp_date:
        range: date
        required: true
        slot_uri: omop:nlp_date
        description: "The date of the note processing."
      nlp_datetime:
        range: datetime
        required: false
        slot_uri: omop:nlp_datetime
        description: "The date and time of the note processing."
      term_exists:
        range: string
        required: false
        slot_uri: omop:term_exists
        comments:
          - "Term_exists is defined as a flag that indicates if the patient actually has or had the condition. Any of the following modifiers would make Term_exists false: Negation = true Subject = [anything other than the patient] Conditional = true/li> Rule_out = true Uncertain = very low certainty or any lower certainties A complete lack of modifiers would make Term_exists true."
      term_temporal:
        range: string
        required: false
        slot_uri: omop:term_temporal
        comments:
          - "Term_temporal is to indicate if a condition is present or just in the past. The following would be past:<br><br> - History = true - Concept_date = anything before the time of the report"
      term_modifiers:
        range: string
        required: false
        slot_uri: omop:term_modifiers
        comments:
          - "For the modifiers that are there, they would have to have these values:<br><br> - Negation = false - Subject = patient - Conditional = false - Rule_out = false - Uncertain = true or high or moderate or even low (could argue about low). Term_modifiers will concatenate all modifiers for different types of entities (conditions, drugs, labs etc) into one string. Lab values will be saved as one of the modifiers."

  Specimen:
    class_uri: omop:Specimen
    description: "The specimen domain contains the records identifying biological samples from a person."
    annotations:
      omop_schema: CDM
    attributes:
      specimen_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:specimen_id
        description: "Unique identifier for each specimen."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
        description: "The person from whom the specimen is collected."
      specimen_concept_id:
        range: Concept
        required: true
        slot_uri: omop:specimen_concept_id
        comments:
          - "The standard CONCEPT_ID that the SPECIMEN_SOURCE_VALUE maps to in the specimen domain. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Specimen&standardConcept=Standard&page=1&pageSize=15&query=)"
      specimen_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: true
        slot_uri: omop:specimen_type_concept_id
        comments:
          - "Put the source of the specimen record, as in an EHR system. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?standardConcept=Standard&domain=Type+Concept&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."
      specimen_date:
        range: date
        required: true
        slot_uri: omop:specimen_date
        description: "The date the specimen was collected."
      specimen_datetime:
        range: datetime
        required: false
        slot_uri: omop:specimen_datetime
      quantity:
        range: float
        required: false
        slot_uri: omop:quantity
        description: "The amount of specimen collected from the person."
      unit_concept_id:
        range: Concept
        required: false
        slot_uri: omop:unit_concept_id
        description: "The unit for the quantity of the specimen."
        comments:
          - "Map the UNIT_SOURCE_VALUE to a Standard Concept in the Unit domain. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Unit&standardConcept=Standard&page=1&pageSize=15&query=). If the source unit is NULL (applicable to cases when there's no numerical value or when it doesn't require a unit), keep unit_concept_id NULL as well. If there's no mapping of a source unit, populate unit_concept_id with 0."
      anatomic_site_concept_id:
        range: Concept
        required: false
        slot_uri: omop:anatomic_site_concept_id
        description: "This is the site on the body where the specimen is from."
        comments:
          - "Map the ANATOMIC_SITE_SOURCE_VALUE to a Standard Concept in the Spec Anatomic Site domain. This should be coded at the lowest level of granularity [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?standardConcept=Standard&domain=Spec+Anatomic+Site&conceptClass=Body+Structure&page=4&pageSize=15&query=)"
      disease_status_concept_id:
        range: Concept
        required: false
        slot_uri: omop:disease_status_concept_id
      specimen_source_id:
        range: string
        required: false
        slot_uri: omop:specimen_source_id
        description: "This is the identifier for the specimen from the source system."
      specimen_source_value:
        range: string
        required: false
        slot_uri: omop:specimen_source_value
      unit_source_value:
        range: string
        required: false
        slot_uri: omop:unit_source_value
        comments:
          - "This unit for the quantity of the specimen, as represented in the source."
      anatomic_site_source_value:
        range: string
        required: false
        slot_uri: omop:anatomic_site_source_value
        comments:
          - "This is the site on the body where the specimen was taken from, as represented in the source."
      disease_status_source_value:
        range: string
        required: false
        slot_uri: omop:disease_status_source_value

  FactRelationship:
    class_uri: omop:FactRelationship
    description: "The FACT_RELATIONSHIP table contains records about the relationships between facts stored as records in any table of the CDM. Relationships can be defined between facts from the same domain, or different domains. Examples of Fact Relationships include: [Person relationships](https://athena.ohdsi.org/search-terms/terms?domain=Relationship&standardConcept=Standard&page=2&pageSize=15&query=) (parent-child), care site relationships (hierarchical organizational structure of facilities within a health system), indication relationship (between drug exposures and associated conditions), usage relationships (of devices during the course of an associated procedure), or facts derived from one another (measurements derived from an associated specimen)."
    annotations:
      omop_schema: CDM
    attributes:
      domain_concept_id_1:
        range: Concept
        required: true
        slot_uri: omop:domain_concept_id_1
      fact_id_1:
        range: integer
        required: true
        slot_uri: omop:fact_id_1
      domain_concept_id_2:
        range: Concept
        required: true
        slot_uri: omop:domain_concept_id_2
      fact_id_2:
        range: integer
        required: true
        slot_uri: omop:fact_id_2
      relationship_concept_id:
        range: Concept
        required: true
        slot_uri: omop:relationship_concept_id

  Location:
    class_uri: omop:Location
    description: "The LOCATION table represents a generic way to capture physical location or address information of Persons and Care Sites."
    comments:
      - "The current iteration of the LOCATION table is US centric. Until a major release to correct this, certain fields can be used to represent different international values. <br><br> - STATE can also be used for province or district<br>- ZIP is also the postal code or postcode <br>- COUNTY can also be used to represent region"
    annotations:
      omop_schema: CDM
    attributes:
      location_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:location_id
        description: "The unique key given to a unique Location."
        comments:
          - "Each instance of a Location in the source data should be assigned this unique key."
      address_1:
        range: string
        required: false
        slot_uri: omop:address_1
        description: "This is the first line of the address."
      address_2:
        range: string
        required: false
        slot_uri: omop:address_2
        description: "This is the second line of the address"
      city:
        range: string
        required: false
        slot_uri: omop:city
      state:
        range: string
        required: false
        slot_uri: omop:state
      zip:
        range: string
        required: false
        slot_uri: omop:zip
        comments:
          - "Zip codes are handled as strings of up to 9 characters length. For US addresses, these represent either a 3-digit abbreviated Zip code as provided by many sources for patient protection reasons, the full 5-digit Zip or the 9-digit (ZIP + 4) codes. Unless for specific reasons analytical methods should expect and utilize only the first 3 digits. For international addresses, different rules apply."
      county:
        range: string
        required: false
        slot_uri: omop:county
      location_source_value:
        range: string
        required: false
        slot_uri: omop:location_source_value
        comments:
          - "Put the verbatim value for the location here, as it shows up in the source."
      country_concept_id:
        range: Concept
        required: false
        slot_uri: omop:country_concept_id
        description: "The Concept Id representing the country. Values should conform to the [Geography](https://athena.ohdsi.org/search-terms/terms?domain=Geography&standardConcept=Standard&page=1&pageSize=15&query=&boosts) domain."
      country_source_value:
        range: string
        required: false
        slot_uri: omop:country_source_value
        description: "The name of the country."
      latitude:
        range: float
        required: false
        slot_uri: omop:latitude
        comments:
          - "Must be between -90 and 90."
      longitude:
        range: float
        required: false
        slot_uri: omop:longitude
        comments:
          - "Must be between -180 and 180."

  CareSite:
    class_uri: omop:CareSite
    description: "The CARE_SITE table contains a list of uniquely identified institutional (physical or organizational) units where healthcare delivery is practiced (offices, wards, hospitals, clinics, etc.)."
    annotations:
      omop_schema: CDM
    attributes:
      care_site_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:care_site_id
        comments:
          - "Assign an ID to each combination of a location and nature of the site - the latter could be the Place of Service, name or another characteristic in your source data."
      care_site_name:
        range: string
        required: false
        slot_uri: omop:care_site_name
        description: "The name of the care_site as it appears in the source data"
      place_of_service_concept_id:
        range: Concept
        required: false
        slot_uri: omop:place_of_service_concept_id
        description: "This is a high-level way of characterizing a Care Site. Typically, however, Care Sites can provide care in multiple settings (inpatient, outpatient, etc.) and this granularity should be reflected in the visit."
        comments:
          - "Choose the concept in the visit domain that best represents the setting in which healthcare is provided in the Care Site. If most visits in a Care Site are Inpatient, then the place_of_service_concept_id should represent Inpatient. If information is present about a unique Care Site (e.g. Pharmacy) then a Care Site record should be created. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Visit&standardConcept=Standard&page=2&pageSize=15&query=). For information about how to populate this field please see the [THEMIS Conventions](https://ohdsi.github.io/Themis/tag_place_of_service.html)."
      location_id:
        range: Location
        required: false
        slot_uri: omop:location_id
        description: "The location_id from the LOCATION table representing the physical location of the care_site."
      care_site_source_value:
        range: string
        required: false
        slot_uri: omop:care_site_source_value
        description: "The identifier of the care_site as it appears in the source data. This could be an identifier separate from the name of the care_site."
      place_of_service_source_value:
        range: string
        required: false
        slot_uri: omop:place_of_service_source_value
        comments:
          - "Put the place of service of the care_site as it appears in the source data."

  Provider:
    class_uri: omop:Provider
    description: "The PROVIDER table contains a list of uniquely identified healthcare providers; duplication is not allowed. These are individuals providing hands-on healthcare to patients, such as physicians, nurses, midwives, physical therapists etc."
    comments:
      - "Many sources do not make a distinction between individual and institutional providers. The PROVIDER table contains the individual providers. If the source only provides limited information such as specialty instead of uniquely identifying individual providers, generic or 'pooled' Provider records are listed in the PROVIDER table."
    annotations:
      omop_schema: CDM
    attributes:
      provider_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:provider_id
        description: "It is assumed that every provider with a different unique identifier is in fact a different person and should be treated independently."
        comments:
          - "This identifier can be the original id from the source data provided it is an integer, otherwise it can be an autogenerated number."
      provider_name:
        range: string
        required: false
        slot_uri: omop:provider_name
        description: "This field contains information that describes a healthcare provider."
        comments:
          - "This field is not required for identifying the Provider's actual identity. Instead, its purpose is to uniquely and/or anonymously identify providers of care across the database."
      npi:
        range: string
        required: false
        slot_uri: omop:npi
        description: "This is the National Provider Number issued to health care providers in the US by the Centers for Medicare and Medicaid Services (CMS)."
      dea:
        range: string
        required: false
        slot_uri: omop:dea
        description: "This is the identifier issued by the DEA, a US federal agency, that allows a provider to write prescriptions for controlled substances."
      specialty_concept_id:
        range: Concept
        required: false
        slot_uri: omop:specialty_concept_id
        description: "This field either represents the most common specialty that occurs in the data or the most specific concept that represents all specialties listed, should the provider have more than one. This includes physician specialties such as internal medicine, emergency medicine, etc. and allied health professionals such as nurses, midwives, and pharmacists."
        comments:
          - "If a Provider has more than one Specialty, there are two options: 1. Choose a concept_id which is a common ancestor to the multiple specialties, or, 2. Choose the specialty that occurs most often for the provider. Concepts in this field should be Standard with a domain of Provider. [Accepted Concepts](http://athena.ohdsi.org/search-terms/terms?domain=Provider&standardConcept=Standard&page=1&pageSize=15&query=)."
      care_site_id:
        range: CareSite
        required: false
        slot_uri: omop:care_site_id
        description: "This is the CARE_SITE_ID for the location that the provider primarily practices in."
        comments:
          - "If a Provider has more than one Care Site, the main or most often exerted CARE_SITE_ID should be recorded."
      year_of_birth:
        range: integer
        required: false
        slot_uri: omop:year_of_birth
      gender_concept_id:
        range: Concept
        # fk_domain: Gender
        required: false
        slot_uri: omop:gender_concept_id
        description: "This field represents the recorded gender of the provider in the source data."
        comments:
          - "If given, put a concept from the gender domain representing the recorded gender of the provider. [Accepted Concepts](http://athena.ohdsi.org/search-terms/terms?domain=Gender&standardConcept=Standard&page=1&pageSize=15&query=)."
      provider_source_value:
        range: string
        required: false
        slot_uri: omop:provider_source_value
        description: "Use this field to link back to providers in the source data. This is typically used for error checking of ETL logic."
        comments:
          - "Some use cases require the ability to link back to providers in the source data. This field allows for the storing of the provider identifier as it appears in the source."
      specialty_source_value:
        range: string
        required: false
        slot_uri: omop:specialty_source_value
        description: "This refers to the specific type of healthcare provider or field of expertise listed in the source data, encompassing physician specialties like internal medicine, emergency medicine, etc., as well as allied health professionals such as nurses, midwives, and pharmacists. It covers medical specialties like surgery, internal medicine, and radiology, while other services like prosthetics, acupuncture, and physical therapy fall under the domain of \"Service.\""
        comments:
          - "The type of provider and their specialty should be entered as they appear in the source data. The decision to use either the coded value or the text description is left to the discretion of the ETL-er."
      specialty_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:specialty_source_concept_id
        description: "This is often zero as many sites use proprietary codes to store physician speciality."
        comments:
          - "If the source data codes provider specialty in an OMOP supported vocabulary store the concept_id here."
      gender_source_value:
        range: string
        required: false
        slot_uri: omop:gender_source_value
        description: "This is provider's gender as it appears in the source data."
        comments:
          - "Put the provider's gender as it appears in the source data. This field is up to the discretion of the ETL-er as to whether this should be the coded value from the source or the text description of the lookup value."
      gender_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:gender_source_concept_id
        description: "This is often zero as many sites use proprietary codes to store provider gender."
        comments:
          - "If the source data codes provider gender in an OMOP supported vocabulary store the concept_id here."

  PayerPlanPeriod:
    class_uri: omop:PayerPlanPeriod
    description: "The PAYER_PLAN_PERIOD table captures details of the period of time that a Person is continuously enrolled under a specific health Plan benefit structure from a given Payer. Each Person receiving healthcare is typically covered by a health benefit plan, which pays for (fully or partially), or directly provides, the care. These benefit plans are provided by payers, such as health insurances or state or government agencies. In each plan the details of the health benefits are defined for the Person or her family, and the health benefit Plan might change over time typically with increasing utilization (reaching certain cost thresholds such as deductibles), plan availability and purchasing choices of the Person. The unique combinations of Payer organizations, health benefit Plans and time periods in which they are valid for a Person are recorded in this table."
    comments:
      - "A Person can have multiple, overlapping, Payer_Plan_Periods in this table. For example, medical and drug coverage in the US can be represented by two Payer_Plan_Periods. The details of the benefit structure of the Plan is rarely known, the idea is just to identify that the Plans are different."
    annotations:
      omop_schema: CDM
    attributes:
      payer_plan_period_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:payer_plan_period_id
        description: "A unique identifier for each unique combination of a Person, Payer, Plan, and Period of time."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
        description: "The Person covered by the Plan."
        comments:
          - "A single Person can have multiple, overlapping, PAYER_PLAN_PERIOD records"
      payer_plan_period_start_date:
        range: date
        required: true
        slot_uri: omop:payer_plan_period_start_date
        description: "Start date of Plan coverage."
      payer_plan_period_end_date:
        range: date
        required: true
        slot_uri: omop:payer_plan_period_end_date
        description: "End date of Plan coverage."
      payer_concept_id:
        range: Concept
        required: false
        slot_uri: omop:payer_concept_id
        description: "This field represents the organization who reimburses the provider which administers care to the Person."
        comments:
          - "Map the payer directly to a standard CONCEPT_ID with the domain_id of 'Payer' ([Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Payer&standardConcept=Standard&page=1&pageSize=15&query=)). This vocabulary is not exhaustive so if there is a value missing, please see the [custom concepts](https://ohdsi.github.io/CommonDataModel/customConcepts.html) page."
      payer_source_value:
        range: string
        required: false
        slot_uri: omop:payer_source_value
        description: "This is the Payer as it appears in the source data."
      payer_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:payer_source_concept_id
        comments:
          - "If the source data codes the Payer in an OMOP supported vocabulary store the concept_id here."
      plan_concept_id:
        range: Concept
        required: false
        slot_uri: omop:plan_concept_id
        description: "This field represents the specific health benefit Plan the Person is enrolled in."
        comments:
          - "Map the Plan directly to a standard CONCEPT_ID in the 'Plan' vocabulary ([Accepted Concepts](http://athena.ohdsi.org/search-terms/terms?domain=Plan&standardConcept=Standard&page=1&pageSize=15&query=)). This vocabulary is not exhaustive so if there is a value missing, please see the [custom concepts](https://ohdsi.github.io/CommonDataModel/customConcepts.html) page."
      plan_source_value:
        range: string
        required: false
        slot_uri: omop:plan_source_value
        description: "This is the health benefit Plan of the Person as it appears in the source data."
      plan_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:plan_source_concept_id
        comments:
          - "If the source data codes the Plan in an OMOP supported vocabulary store the concept_id here."
      sponsor_concept_id:
        range: Concept
        required: false
        slot_uri: omop:sponsor_concept_id
        description: "This field represents the sponsor of the Plan who finances the Plan. This includes self-insured, small group health plan and large group health plan."
        comments:
          - "Map the sponsor directly to a standard CONCEPT_ID with the domain_id of 'Sponsor' ([Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Sponsor&standardConcept=Standard&page=1&pageSize=15&query=)). This vocabulary is not exhaustive so if there is a value missing, please see the [custom concepts](https://ohdsi.github.io/CommonDataModel/customConcepts.html) page."
      sponsor_source_value:
        range: string
        required: false
        slot_uri: omop:sponsor_source_value
        description: "The Plan sponsor as it appears in the source data."
      sponsor_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:sponsor_source_concept_id
        comments:
          - "If the source data codes the sponsor in an OMOP supported vocabulary store the concept_id here."
      family_source_value:
        range: string
        required: false
        slot_uri: omop:family_source_value
        description: "The common identifier for all people (often a family) that covered by the same policy."
        comments:
          - "Often these are the common digits of the enrollment id of the policy members."
      stop_reason_concept_id:
        range: Concept
        required: false
        slot_uri: omop:stop_reason_concept_id
        description: "This field represents the reason the Person left the Plan, if known."
        comments:
          - "Map the stop reason directly to a standard CONCEPT_ID with a domain of 'Plan Stop Reason' ([Accepted Concepts](http://athena.ohdsi.org/search-terms/terms?domain=Plan+Stop+Reason&standardConcept=Standard&page=1&pageSize=15&query=)). If one does not exist visit the [Custom Concepts](https://ohdsi.github.io/CommonDataModel/customConcepts.html) pate for more information."
      stop_reason_source_value:
        range: string
        required: false
        slot_uri: omop:stop_reason_source_value
        description: "The Plan stop reason as it appears in the source data."
      stop_reason_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:stop_reason_source_concept_id
        comments:
          - "If the source data codes the stop reason in an OMOP supported vocabulary store the concept_id here."

  Cost:
    class_uri: omop:Cost
    description: "The COST table captures records containing the cost of any medical event recorded in one of the OMOP clinical event tables such as DRUG_EXPOSURE, PROCEDURE_OCCURRENCE, VISIT_OCCURRENCE, VISIT_DETAIL, DEVICE_OCCURRENCE, OBSERVATION or MEASUREMENT. Each record in the cost table account for the amount of money transacted for the clinical event. So, the COST table may be used to represent both receivables (charges) and payments (paid), each transaction type represented by its COST_CONCEPT_ID. The COST_TYPE_CONCEPT_ID field will use concepts in the Standardized Vocabularies to designate the source (provenance) of the cost data. A reference to the health plan information in the PAYER_PLAN_PERIOD table is stored in the record for information used for the adjudication system to determine the persons benefit for the clinical event."
    comments:
      - "When dealing with summary costs, the cost of the goods or services the provider provides is often not known directly, but derived from the hospital charges multiplied by an average cost-to-charge ratio."
    annotations:
      omop_schema: CDM
    attributes:
      cost_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:cost_id
      cost_event_id:
        range: integer
        required: true
        slot_uri: omop:cost_event_id
      cost_domain_id:
        range: Domain
        required: true
        slot_uri: omop:cost_domain_id
      cost_type_concept_id:
        range: Concept
        required: true
        slot_uri: omop:cost_type_concept_id
      currency_concept_id:
        range: Concept
        required: false
        slot_uri: omop:currency_concept_id
      total_charge:
        range: float
        required: false
        slot_uri: omop:total_charge
      total_cost:
        range: float
        required: false
        slot_uri: omop:total_cost
      total_paid:
        range: float
        required: false
        slot_uri: omop:total_paid
      paid_by_payer:
        range: float
        required: false
        slot_uri: omop:paid_by_payer
      paid_by_patient:
        range: float
        required: false
        slot_uri: omop:paid_by_patient
      paid_patient_copay:
        range: float
        required: false
        slot_uri: omop:paid_patient_copay
      paid_patient_coinsurance:
        range: float
        required: false
        slot_uri: omop:paid_patient_coinsurance
      paid_patient_deductible:
        range: float
        required: false
        slot_uri: omop:paid_patient_deductible
      paid_by_primary:
        range: float
        required: false
        slot_uri: omop:paid_by_primary
      paid_ingredient_cost:
        range: float
        required: false
        slot_uri: omop:paid_ingredient_cost
      paid_dispensing_fee:
        range: float
        required: false
        slot_uri: omop:paid_dispensing_fee
      payer_plan_period_id:
        range: integer
        required: false
        slot_uri: omop:payer_plan_period_id
      amount_allowed:
        range: float
        required: false
        slot_uri: omop:amount_allowed
      revenue_code_concept_id:
        range: Concept
        required: false
        slot_uri: omop:revenue_code_concept_id
      revenue_code_source_value:
        range: string
        required: false
        slot_uri: omop:revenue_code_source_value
        description: "Revenue codes are a method to charge for a class of procedures and conditions in the U.S. hospital system."
      drg_concept_id:
        range: Concept
        required: false
        slot_uri: omop:drg_concept_id
      drg_source_value:
        range: string
        required: false
        slot_uri: omop:drg_source_value
        description: "Diagnosis Related Groups are US codes used to classify hospital cases into one of approximately 500 groups."

  DrugEra:
    class_uri: omop:DrugEra
    description: "A Drug Era is defined as a span of time when the Person is assumed to be exposed to a particular active ingredient. A Drug Era is not the same as a Drug Exposure: Exposures are individual records corresponding to the source when Drug was delivered to the Person, while successive periods of Drug Exposures are combined under certain rules to produce continuous Drug Eras. Every record in the DRUG_EXPOSURE table should be part of a drug era based on the dates of exposure."
    annotations:
      omop_schema: CDM
    attributes:
      drug_era_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:drug_era_id
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
      drug_concept_id:
        range: Concept
        # fk_domain: Drug
        required: true
        slot_uri: omop:drug_concept_id
        description: "The drug_concept_id should conform to the concept class 'ingredient' as the drug_era is an era of time where a person is exposed to a particular drug ingredient."
      drug_era_start_date:
        range: date
        required: true
        slot_uri: omop:drug_era_start_date
        comments:
          - "The Drug Era Start Date is the start date of the first Drug Exposure for a given ingredient, with at least 31 days since the previous exposure."
      drug_era_end_date:
        range: date
        required: true
        slot_uri: omop:drug_era_end_date
        comments:
          - "The Drug Era End Date is the end date of the last Drug Exposure. The End Date of each Drug Exposure is either taken from the field drug_exposure_end_date or, as it is typically not available, inferred using the following rules: For pharmacy prescription data, the date when the drug was dispensed plus the number of days of supply are used to extrapolate the End Date for the Drug Exposure. Depending on the country-specific healthcare system, this supply information is either explicitly provided in the day_supply field or inferred from package size or similar information. For Procedure Drugs, usually the drug is administered on a single date (i.e., the administration date). A standard Persistence Window of 30 days (gap, slack) is permitted between two subsequent such extrapolated DRUG_EXPOSURE records to be considered to be merged into a single Drug Era."
      drug_exposure_count:
        range: integer
        required: false
        slot_uri: omop:drug_exposure_count
        description: "The count of grouped DRUG_EXPOSURE records that were included in the DRUG_ERA row"
      gap_days:
        range: integer
        required: false
        slot_uri: omop:gap_days
        comments:
          - "The Gap Days determine how many total drug-free days are observed between all Drug Exposure events that contribute to a DRUG_ERA record. It is assumed that the drugs are \"not stockpiled\" by the patient, i.e. that if a new drug prescription or refill is observed (a new DRUG_EXPOSURE record is written), the remaining supply from the previous events is abandoned. The difference between Persistence Window and Gap Days is that the former is the maximum drug-free time allowed between two subsequent DRUG_EXPOSURE records, while the latter is the sum of actual drug-free days for the given Drug Era under the above assumption of non-stockpiling."

  DoseEra:
    class_uri: omop:DoseEra
    description: "A Dose Era is defined as a span of time when the Person is assumed to be exposed to a constant dose of a specific active ingredient."
    annotations:
      omop_schema: CDM
    attributes:
      dose_era_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:dose_era_id
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
      drug_concept_id:
        range: Concept
        # fk_domain: Drug
        required: true
        slot_uri: omop:drug_concept_id
        description: "The Concept Id representing the specific drug ingredient."
      unit_concept_id:
        range: Concept
        # fk_domain: Unit
        required: true
        slot_uri: omop:unit_concept_id
        description: "The Concept Id representing the unit of the specific drug ingredient."
      dose_value:
        range: float
        required: true
        slot_uri: omop:dose_value
        description: "The numeric value of the dosage of the drug_ingredient."
      dose_era_start_date:
        range: date
        required: true
        slot_uri: omop:dose_era_start_date
        description: "The date the Person started on the specific dosage, with at least 31 days since any prior exposure."
      dose_era_end_date:
        range: date
        required: true
        slot_uri: omop:dose_era_end_date
        comments:
          - "The date the Person was no longer exposed to the dosage of the specific drug ingredient. An era is ended if there are 31 days or more between dosage records."

  ConditionEra:
    class_uri: omop:ConditionEra
    description: "A Condition Era is defined as a span of time when the Person is assumed to have a given condition. Similar to Drug Eras, Condition Eras are chronological periods of Condition Occurrence and every Condition Occurrence record should be part of a Condition Era. Combining individual Condition Occurrences into a single Condition Era serves two purposes: - It allows aggregation of chronic conditions that require frequent ongoing care, instead of treating each Condition Occurrence as an independent event. - It allows aggregation of multiple, closely timed doctor visits for the same Condition to avoid double-counting the Condition Occurrences. For example, consider a Person who visits her Primary Care Physician (PCP) and who is referred to a specialist. At a later time, the Person visits the specialist, who confirms the PCP's original diagnosis and provides the appropriate treatment to resolve the condition. These two independent doctor visits should be aggregated into one Condition Era."
    annotations:
      omop_schema: CDM
    attributes:
      condition_era_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:condition_era_id
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
      condition_concept_id:
        range: Concept
        # fk_domain: Condition
        required: true
        slot_uri: omop:condition_concept_id
        description: "The Concept Id representing the Condition."
      condition_era_start_date:
        range: date
        required: true
        slot_uri: omop:condition_era_start_date
        description: "The start date for the Condition Era constructed from the individual instances of Condition Occurrences. It is the start date of the very first chronologically recorded instance of the condition with at least 31 days since any prior record of the same Condition."
      condition_era_end_date:
        range: date
        required: true
        slot_uri: omop:condition_era_end_date
        description: "The end date for the Condition Era constructed from the individual instances of Condition Occurrences. It is the end date of the final continuously recorded instance of the Condition."
      condition_occurrence_count:
        range: integer
        required: false
        slot_uri: omop:condition_occurrence_count
        description: "The number of individual Condition Occurrences used to construct the condition era."

  Episode:
    class_uri: omop:Episode
    description: "The EPISODE table aggregates lower-level clinical events (VISIT_OCCURRENCE, DRUG_EXPOSURE, PROCEDURE_OCCURRENCE, DEVICE_EXPOSURE) into a higher-level abstraction representing clinically and analytically relevant disease phases,outcomes and treatments. The EPISODE_EVENT table connects qualifying clinical events (VISIT_OCCURRENCE, DRUG_EXPOSURE, PROCEDURE_OCCURRENCE, DEVICE_EXPOSURE) to the appropriate EPISODE entry. For example cancers including their development over time, their treatment, and final resolution."
    comments:
      - "Valid Episode Concepts belong to the 'Episode' domain. For cancer episodes please see [article], for non-cancer episodes please see [article]. If your source data does not have all episodes that are relevant to the therapeutic area, write only those you can easily derive from the data. It is understood that that table is not currently expected to be comprehensive."
    annotations:
      omop_schema: CDM
    attributes:
      episode_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:episode_id
        description: "A unique identifier for each Episode."
      person_id:
        range: Person
        required: true
        slot_uri: omop:person_id
        description: "The PERSON_ID of the PERSON for whom the episode is recorded."
      episode_concept_id:
        range: Concept
        # fk_domain: Episode
        required: true
        slot_uri: omop:episode_concept_id
        description: "The EPISODE_CONCEPT_ID represents the kind abstraction related to the disease phase, outcome or treatment."
        comments:
          - "Choose a concept in the Episode domain that best represents the ongoing disease phase, outcome, or treatment. Please see [article] for cancers and [article] for non-cancers describing how these are defined. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Episode&page=1&pageSize=15&query=)"
      episode_start_date:
        range: date
        required: true
        slot_uri: omop:episode_start_date
        description: "The date when the Episode beings."
        comments:
          - "Please see [article] for how to define an Episode start date."
      episode_start_datetime:
        range: datetime
        required: false
        slot_uri: omop:episode_start_datetime
        description: "The date and time when the Episode begins."
      episode_end_date:
        range: date
        required: false
        slot_uri: omop:episode_end_date
        description: "The date when the instance of the Episode is considered to have ended."
        comments:
          - "Please see [article] for how to define an Episode end date."
      episode_end_datetime:
        range: datetime
        required: false
        slot_uri: omop:episode_end_datetime
        description: "The date when the instance of the Episode is considered to have ended."
      episode_parent_id:
        range: integer
        required: false
        slot_uri: omop:episode_parent_id
        description: "Use this field to find the Episode that subsumes the given Episode record. This is used in the case that an Episode are nested into each other."
        comments:
          - "If there are multiple nested levels to how Episodes are represented, the EPISODE_PARENT_ID can be used to record this relationship."
      episode_number:
        range: integer
        required: false
        slot_uri: omop:episode_number
        description: "For sequences of episodes, this is used to indicate the order the episodes occurred. For example, lines of treatment could be indicated here."
        comments:
          - "Please see [article] for the details of how to count episodes."
      episode_object_concept_id:
        range: Concept
        # fk_domain: Procedure, Regimen
        required: true
        slot_uri: omop:episode_object_concept_id
        description: "A Standard Concept representing the disease phase, outcome, or other abstraction of which the episode consists. For example, if the EPISODE_CONCEPT_ID is [treatment regimen](https://athena.ohdsi.org/search-terms/terms/32531) then the EPISODE_OBJECT_CONCEPT_ID should contain the chemotherapy regimen concept, like [Afatinib monotherapy](https://athena.ohdsi.org/search-terms/terms/35804392)."
        comments:
          - "Episode entries from the 'Disease Episode' concept class should have an episode_object_concept_id that comes from the Condition domain. Episode entries from the 'Treatment Episode' concept class should have an episode_object_concept_id that scome from the 'Procedure' domain or 'Regimen' concept class."
      episode_type_concept_id:
        range: Concept
        # fk_domain: Type Concept
        required: true
        slot_uri: omop:episode_type_concept_id
        description: "This field can be used to determine the provenance of the Episode record, as in whether the episode was from an EHR system, insurance claim, registry, or other sources."
        comments:
          - "Choose the EPISODE_TYPE_CONCEPT_ID that best represents the provenance of the record. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?domain=Type+Concept&standardConcept=Standard&page=1&pageSize=15&query=). A more detailed explanation of each Type Concept can be found on the [vocabulary wiki](https://github.com/OHDSI/Vocabulary-v5.0/wiki/Vocab.-TYPE_CONCEPT)."
      episode_source_value:
        range: string
        required: false
        slot_uri: omop:episode_source_value
        description: "The source code for the Episode as it appears in the source data. This code is mapped to a Standard Condition Concept in the Standardized Vocabularies and the original code is stored here for reference."
      episode_source_concept_id:
        range: Concept
        required: false
        slot_uri: omop:episode_source_concept_id
        description: "A foreign key to a Episode Concept that refers to the code used in the source."
        comments:
          - "Given that the Episodes are user-defined it is unlikely that there will be a Source Concept available. If that is the case then set this field to zero."

  EpisodeEvent:
    class_uri: omop:EpisodeEvent
    description: "The EPISODE_EVENT table connects qualifying clinical events (such as CONDITION_OCCURRENCE, DRUG_EXPOSURE, PROCEDURE_OCCURRENCE, MEASUREMENT) to the appropriate EPISODE entry. For example, linking the precise location of the metastasis (cancer modifier in MEASUREMENT) to the disease episode."
    comments:
      - "This connecting table is used instead of the FACT_RELATIONSHIP table for linking low-level events to abstracted Episodes."
    annotations:
      omop_schema: CDM
    attributes:
      episode_id:
        range: Episode
        required: true
        slot_uri: omop:episode_id
        description: "Use this field to link the EPISODE_EVENT record to its EPISODE."
        comments:
          - "Put the EPISODE_ID that subsumes the EPISODE_EVENT record here."
      event_id:
        range: integer
        required: true
        slot_uri: omop:event_id
        description: "This field is the primary key of the linked record in the database. For example, if the Episode Event is a Condition Occurrence, then the CONDITION_OCCURRENCE_ID of the linked record goes in this field."
        comments:
          - "Put the primary key of the linked record here."
      episode_event_field_concept_id:
        range: Concept
        # fk_domain: Metadata
        required: true
        slot_uri: omop:episode_event_field_concept_id
        description: "This field is the CONCEPT_ID that identifies which table the primary key of the linked record came from."
        comments:
          - "Put the CONCEPT_ID that identifies which table and field the EVENT_ID came from. [Accepted Concepts](https://athena.ohdsi.org/search-terms/terms?vocabulary=CDM&conceptClass=Field&page=1&pageSize=15&query=)"

  Metadata:
    class_uri: omop:Metadata
    description: "The METADATA table contains metadata information about a dataset that has been transformed to the OMOP Common Data Model."
    annotations:
      omop_schema: CDM
    attributes:
      metadata_id:
        range: integer
        identifier: true
        required: true
        slot_uri: omop:metadata_id
        description: "The unique key given to a Metadata record."
        comments:
          - "Attribute value is auto-generated"
      metadata_concept_id:
        range: Concept
        required: true
        slot_uri: omop:metadata_concept_id
      metadata_type_concept_id:
        range: Concept
        required: true
        slot_uri: omop:metadata_type_concept_id
      name:
        range: string
        required: true
        slot_uri: omop:name
      value_as_string:
        range: string
        required: false
        slot_uri: omop:value_as_string
      value_as_concept_id:
        range: Concept
        required: false
        slot_uri: omop:value_as_concept_id
      value_as_number:
        range: float
        required: false
        slot_uri: omop:value_as_number
        description: "This is the numerical value of the result of the Metadata, if applicable and available. It is not expected that all Metadata will have numeric results, rather, this field is here to house values should they exist."
      metadata_date:
        range: date
        required: false
        slot_uri: omop:metadata_date
      metadata_datetime:
        range: datetime
        required: false
        slot_uri: omop:metadata_datetime

  CdmSource:
    class_uri: omop:CdmSource
    description: "The CDM_SOURCE table contains detail about the source database and the process used to transform the data into the OMOP Common Data Model."
    annotations:
      omop_schema: CDM
    attributes:
      cdm_source_name:
        range: string
        required: true
        slot_uri: omop:cdm_source_name
        description: "The name of the CDM instance."
      cdm_source_abbreviation:
        range: string
        required: true
        slot_uri: omop:cdm_source_abbreviation
        description: "The abbreviation of the CDM instance."
      cdm_holder:
        range: string
        required: true
        slot_uri: omop:cdm_holder
        description: "The holder of the CDM instance."
      source_description:
        range: string
        required: false
        slot_uri: omop:source_description
        description: "The description of the CDM instance."
      source_documentation_reference:
        range: string
        required: false
        slot_uri: omop:source_documentation_reference
      cdm_etl_reference:
        range: string
        required: false
        slot_uri: omop:cdm_etl_reference
        comments:
          - "Version of the ETL script used. e.g. link to the Git release"
      source_release_date:
        range: date
        required: true
        slot_uri: omop:source_release_date
        description: "The date the data was extracted from the source system. In some systems that is the same as the date the ETL was run. Typically the latest even date in the source is on the source_release_date."
      cdm_release_date:
        range: date
        required: true
        slot_uri: omop:cdm_release_date
        description: "The date the ETL script was completed. Typically this is after the source_release_date."
      cdm_version:
        range: string
        required: false
        slot_uri: omop:cdm_version
        description: "Version of the OMOP CDM used as string. e.g. v5.4"
      cdm_version_concept_id:
        range: Concept
        required: true
        slot_uri: omop:cdm_version_concept_id
        description: "The Concept Id representing the version of the CDM."
        comments:
          - "You can find all concepts that represent the CDM versions using the query: `SELECT * FROM CONCEPT WHERE VOCABULARY_ID = 'CDM' AND CONCEPT_CLASS = 'CDM'`"
      vocabulary_version:
        range: string
        required: true
        slot_uri: omop:vocabulary_version
        description: "Version of the OMOP standardised vocabularies loaded"
        comments:
          - "You can find the version of your Vocabulary using the query: `SELECT vocabulary_version from vocabulary where vocabulary_id = 'None'`"

